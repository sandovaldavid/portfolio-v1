services:
    playwright:
        build:
            context: .
            dockerfile: Dockerfile.test
        image: portfolio-v1-test:latest
        init: true
        ipc: host
        user: '${HOST_UID:-1000}:${HOST_GID:-1000}'
        working_dir: /workspace
        volumes:
            - .:/workspace:z
            - ./.docker/runtime/node_modules:/workspace/node_modules:z
            - ./.docker/runtime/home:/home/tester:z
        environment:
            HOME: /home/tester
            CI: '${CI:-}'
            RUN_VISUAL_TESTS: '${RUN_VISUAL_TESTS:-}'
        ports:
            - '4321:4321'
