version: 2
updates:
    # npm dependencies managed through package.json and bun.lock
    - package-ecosystem: 'npm'
      directory: '/'
      schedule:
          interval: 'weekly'
          day: 'monday'
          time: '09:00'
      pull-request-branch-name:
          separator: '/'
      commit-message:
          prefix: 'chore'
          prefix-development: 'chore'
          include: 'scope'
      reviewers:
          - 'sandovaldavid'
      assignees:
          - 'sandovaldavid'
      open-pull-requests-limit: 5
      rebase-strategy: 'auto'
      groups:
          security-updates:
              applies-to: 'security-updates'
              patterns:
                  - '*'
          production-minor-patch:
              dependency-type: 'production'
              update-types:
                  - 'minor'
                  - 'patch'
          development-minor-patch:
              dependency-type: 'development'
              update-types:
                  - 'minor'
                  - 'patch'
          major-updates:
              update-types:
                  - 'major'

    # GitHub Actions dependencies
    - package-ecosystem: 'github-actions'
      directory: '/'
      schedule:
          interval: 'weekly'
          day: 'monday'
          time: '10:00'
      pull-request-branch-name:
          separator: '/'
      commit-message:
          prefix: 'ci(actions)'
      reviewers:
          - 'sandovaldavid'
      groups:
          github-actions:
              patterns:
                  - '*'
