name: Format Dev Container Change Set

on:
    pull_request:
        branches: [main]
        paths:
            - '.github/workflows/format-devcontainer-pr.yml'

permissions:
    contents: write

jobs:
    format:
        if: github.event.pull_request.head.ref == 'agent/align-devcontainer-dotfiles'
        runs-on: ubuntu-latest
        steps:
            - name: Checkout pull request branch
              uses: actions/checkout@v7
              with:
                  ref: ${{ github.event.pull_request.head.ref }}
                  fetch-depth: 0

            - name: Setup repository
              uses: ./.github/actions/setup-bun

            - name: Format changed Dev Container files
              run: |
                  bunx prettier --write --ignore-unknown --ignore-path .prettierignore -- \
                    .devcontainer/devcontainer.json \
                    .devcontainer/devcontainer-lock.json \
                    .github/workflows/build-devcontainer.yml \
                    docs/DEVCONTAINER.md \
                    scripts/check-devcontainer.mjs

            - name: Commit formatting changes
              run: |
                  if git diff --quiet; then
                    exit 0
                  fi

                  git config user.name 'github-actions[bot]'
                  git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
                  git add \
                    .devcontainer/devcontainer.json \
                    .devcontainer/devcontainer-lock.json \
                    .github/workflows/build-devcontainer.yml \
                    docs/DEVCONTAINER.md \
                    scripts/check-devcontainer.mjs
                  git commit -m 'style(devcontainer): apply repository formatting'
                  git push origin HEAD:${{ github.event.pull_request.head.ref }}
