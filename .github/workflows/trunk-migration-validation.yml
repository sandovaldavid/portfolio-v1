name: Trunk Migration Validation

on:
    pull_request:
        branches: [develop]
        types: [opened, synchronize, reopened]

permissions:
    contents: read

concurrency:
    group: trunk-migration-validation
    cancel-in-progress: true

jobs:
    validate:
        if: github.head_ref == 'chore/adopt-trunk-based-delivery'
        runs-on: ubuntu-latest
        steps:
            - name: Checkout migration head
              uses: actions/checkout@v7
              with:
                  ref: ${{ github.event.pull_request.head.sha }}

            - name: Checkout canonical resume assets
              uses: actions/checkout@v7
              with:
                  ref: resume-assets
                  path: .resume-assets
                  sparse-checkout: public/resume
                  sparse-checkout-cone-mode: false

            - name: Install canonical resume assets
              run: bash scripts/install-resume-assets.sh

            - name: Setup repository
              uses: ./.github/actions/setup-bun

            - name: Format migration changes
              run: |
                  bun run format
                  git diff --binary > formatting.patch

            - name: Run repository quality checks
              run: bun run check

            - name: Run risk-based unit coverage
              run: bun run test:unit:coverage

            - name: Build production output
              run: bun run build

            - name: Validate generated links
              id: generated-links
              continue-on-error: true
              shell: bash
              run: bun run check:links 2>&1 | tee generated-links.log

            - name: Generate bundle report
              run: bun run bundle:analyze

            - name: Enforce route performance budgets
              run: bun run performance:check

            - name: Install desktop browser matrix
              run: bunx playwright install --with-deps chromium firefox webkit

            - name: Run Chromium, Firefox and WebKit
              run: bun run test:e2e:desktop

            - name: Collect Lighthouse reports
              run: bun run lighthouse:collect

            - name: Assert Lighthouse thresholds
              run: bun run lighthouse:assert

            - name: Prepare Lighthouse artifact
              if: always()
              run: |
                  rm -rf lighthouse-reports
                  mkdir -p lighthouse-reports
                  if [ -d .lighthouseci ]; then
                    cp -R .lighthouseci/. lighthouse-reports/
                  fi

            - name: Upload migration validation artifacts
              if: always()
              uses: actions/upload-artifact@v7
              with:
                  name: trunk-migration-validation
                  path: |
                      formatting.patch
                      generated-links.log
                      coverage/
                      bundle-analysis/
                      performance-report/
                      playwright-report/
                      test-results/
                      test-results.json
                      junit-results.xml
                      lighthouse-reports/
                  if-no-files-found: warn
                  retention-days: 7

            - name: Assert generated links
              if: always()
              run: test '${{ steps.generated-links.outcome }}' = 'success'
