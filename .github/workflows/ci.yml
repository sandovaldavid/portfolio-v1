name: Issue 97 Migration

on:
    pull_request:
        branches: [develop]

permissions:
    contents: write

concurrency:
    group: issue-97-migration
    cancel-in-progress: true

jobs:
    migrate:
        if: github.head_ref == 'perf/route-level-budgets'
        runs-on: ubuntu-latest
        steps:
            - name: Checkout migration branch
              uses: actions/checkout@v7
              with:
                  ref: ${{ github.event.pull_request.head.sha }}
                  fetch-depth: 0

            - name: Setup repository
              uses: ./.github/actions/setup-bun

            - name: Restore final CI workflow and apply migration
              id: migration
              continue-on-error: true
              shell: bash
              run: |
                  set -o pipefail
                  {
                    git show origin/develop:.github/workflows/ci.yml > .github/workflows/ci.yml
                    rm -f .github/workflows/issue-97-migrate.yml
                    python - <<'PY'
                  from pathlib import Path
                  path = Path('scripts/issue-97-migrate.py')
                  text = path.read_text().replace('"### Bundle Analysis\\n"', '"## Bundle analysis\\n"')
                  path.write_text(text)
                  PY
                    python -u scripts/issue-97-migrate.py
                    rm scripts/issue-97-migrate.py
                  } 2>&1 | tee migration.log

            - name: Upload migration diagnostic
              if: always()
              uses: actions/upload-artifact@v7
              with:
                  name: issue-97-migration-log
                  path: migration.log
                  if-no-files-found: error
                  retention-days: 1

            - name: Stop after migration failure
              if: steps.migration.outcome != 'success'
              run: exit 1

            - name: Format maintained files
              run: >-
                  bunx prettier --write
                  astro.config.mjs
                  package.json
                  performance-budgets.json
                  scripts/check-route-performance.mjs
                  scripts/analyze-bundle.js
                  tests/e2e/performance.spec.ts
                  src/app/layouts/Layout.astro
                  src/widgets/header/ui/Header.astro
                  src/widgets/header/ui/DesktopNav.astro
                  src/widgets/header/ui/MobileNav.astro
                  .github/workflows/ci.yml
                  .github/workflows/main-quality.yml
                  .github/workflows/scheduled-quality.yml
                  docs/PERFORMANCE.md
                  docs/TESTING.md
                  docs/tools.md
                  README.md
                  README.es.md

            - name: Validate repository
              run: bun run check

            - name: Validate production budgets
              run: |
                  bun run test:unit:ci
                  bun run build
                  bun run performance:check
                  bun run bundle:analyze

            - name: Commit validated non-workflow sources
              shell: bash
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git add \
                    .gitignore \
                    README.md \
                    README.es.md \
                    astro.config.mjs \
                    docs/PERFORMANCE.md \
                    docs/TESTING.md \
                    docs/tools.md \
                    package.json \
                    performance-budgets.json \
                    scripts \
                    src/app/layouts/Layout.astro \
                    src/widgets/header/ui/DesktopNav.astro \
                    src/widgets/header/ui/Header.astro \
                    src/widgets/header/ui/MobileNav.astro \
                    tests/e2e/performance.spec.ts
                  git commit -m "perf: enforce route-level performance budgets"
                  git push origin HEAD:perf/route-level-budgets
