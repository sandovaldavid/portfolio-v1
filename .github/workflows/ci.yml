name: Continuous Integration

on:
    pull_request:
        branches: [main]

permissions:
    contents: write

concurrency:
    group: pr-quality-${{ github.event.pull_request.number }}
    cancel-in-progress: true

jobs:
    migrate-issue-134:
        name: Apply and validate issue 134 migration
        if: github.actor != 'github-actions[bot]'
        runs-on: ubuntu-latest
        steps:
            - name: Checkout writable pull request branch
              uses: actions/checkout@v7
              with:
                  ref: ${{ github.event.pull_request.head.ref }}
                  fetch-depth: 0

            - name: Setup repository
              uses: ./.github/actions/setup-bun

            - name: Apply home section catalog migration
              run: |
                  python scripts/migrate-issue-134.py
                  python scripts/update-issue-134-tests.py
                  rm scripts/migrate-issue-134.py scripts/update-issue-134-tests.py
                  git checkout origin/main -- .github/workflows/ci.yml
                  bun run format

            - name: Capture validation diagnostics
              shell: bash
              run: |
                  mkdir -p issue-134-diagnostics
                  set +e
                  bun run check > issue-134-diagnostics/check.log 2>&1
                  echo $? > issue-134-diagnostics/check.exit
                  bun run test:unit:ci > issue-134-diagnostics/unit.log 2>&1
                  echo $? > issue-134-diagnostics/unit.exit
                  bun run build > issue-134-diagnostics/build.log 2>&1
                  echo $? > issue-134-diagnostics/build.exit
                  git diff --check > issue-134-diagnostics/diff-check.log 2>&1
                  echo $? > issue-134-diagnostics/diff-check.exit
                  exit 0

            - name: Upload migration diagnostics
              uses: actions/upload-artifact@v7
              with:
                  name: issue-134-migration-diagnostics
                  path: issue-134-diagnostics/
                  if-no-files-found: error
                  retention-days: 1

            - name: Require successful validation
              shell: bash
              run: |
                  test "$(cat issue-134-diagnostics/check.exit)" = "0"
                  test "$(cat issue-134-diagnostics/unit.exit)" = "0"
                  test "$(cat issue-134-diagnostics/build.exit)" = "0"
                  test "$(cat issue-134-diagnostics/diff-check.exit)" = "0"

            - name: Commit validated migration
              run: |
                  rm -rf issue-134-diagnostics
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git add -A
                  git commit -m "refactor(i18n): migrate home sections to granular catalogs"
                  git push origin HEAD:${{ github.event.pull_request.head.ref }}
