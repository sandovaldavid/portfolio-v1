name: Continuous Integration

on:
    pull_request:
        branches: [main]

permissions:
    contents: read

concurrency:
    group: pr-quality-${{ github.event.pull_request.number }}
    cancel-in-progress: true

jobs:
    validate:
        name: Code Quality & Commits
        runs-on: ubuntu-latest
        steps:
            - name: Checkout pull request head
              uses: actions/checkout@v7
              with:
                  ref: ${{ github.event.pull_request.head.sha }}

            - name: Setup repository
              uses: ./.github/actions/setup-bun

            - name: Run repository quality checks
              run: bun run check

            - name: Validate squash-merge title
              env:
                  PR_TITLE: ${{ github.event.pull_request.title }}
                  PR_NUMBER: ${{ github.event.pull_request.number }}
              run: echo "${PR_TITLE} (#${PR_NUMBER})" | bunx commitlint

    test-unit:
        name: Unit Tests (Vitest)
        runs-on: ubuntu-latest
        steps:
            - name: Checkout pull request head
              uses: actions/checkout@v7
              with:
                  ref: ${{ github.event.pull_request.head.sha }}

            - name: Setup repository
              uses: ./.github/actions/setup-bun

            - name: Run unit tests
              run: bun run test:unit:ci

    build:
        name: Build & Bundle Analysis
        runs-on: ubuntu-latest
        outputs:
            build-url: ${{ steps.upload-build.outputs.artifact-url }}
            bundle-url: ${{ steps.upload-bundle.outputs.artifact-url }}
        steps:
            - name: Checkout pull request head
              uses: actions/checkout@v7
              with:
                  ref: ${{ github.event.pull_request.head.sha }}

            - name: Setup repository
              uses: ./.github/actions/setup-bun

            - name: Restore Astro cache
              uses: actions/cache@v6
              with:
                  path: .astro
                  key: ${{ runner.os }}-astro-pr-${{ hashFiles('bun.lock', 'src/**', 'astro.config.mjs') }}
                  restore-keys: |
                      ${{ runner.os }}-astro-pr-

            - name: Build production output
              run: bun run build

            - name: Generate bundle report
              run: bun run bundle:analyze

            - name: Enforce route performance budgets
              run: bun run performance:check

            - name: Upload production build
              id: upload-build
              uses: actions/upload-artifact@v7
              with:
                  name: pr-build-output
                  path: dist/
                  if-no-files-found: error
                  retention-days: 1

            - name: Upload bundle report
              id: upload-bundle
              uses: actions/upload-artifact@v7
              with:
                  name: pr-bundle-analysis
                  path: |
                      bundle-analysis/
                      performance-report/
                  if-no-files-found: error
                  retention-days: 7

    smoke:
        name: Playwright Chromium Smoke
        runs-on: ubuntu-latest
        needs: build
        outputs:
            report-url: ${{ steps.upload-report.outputs.artifact-url }}
        steps:
            - name: Checkout pull request head
              uses: actions/checkout@v7
              with:
                  ref: ${{ github.event.pull_request.head.sha }}

            - name: Setup repository
              uses: ./.github/actions/setup-bun

            - name: Download production build
              uses: actions/download-artifact@v8
              with:
                  name: pr-build-output
                  path: dist

            - name: Install Chromium
              run: bunx playwright install --with-deps chromium

            - name: Run Chromium smoke and axe gates
              run: bun run test:e2e:smoke

            - name: Upload Playwright diagnostics
              id: upload-report
              if: always()
              uses: actions/upload-artifact@v7
              with:
                  name: pr-playwright-smoke
                  path: |
                      playwright-report/
                      test-results/
                      test-results.json
                      junit-results.xml
                  if-no-files-found: warn
                  retention-days: 7

    summary:
        name: PR Summary Report
        runs-on: ubuntu-latest
        needs: [validate, test-unit, build, smoke]
        if: always()
        steps:
            - name: Write proportional CI summary
              shell: bash
              run: |
                  {
                    echo "## Pull request quality summary"
                    echo
                    echo "| Gate | Result |"
                    echo "|---|---|"
                    echo "| Code quality and squash title | ${{ needs.validate.result }} |"
                    echo "| Unit tests | ${{ needs.test-unit.result }} |"
                    echo "| Production build and bundle report | ${{ needs.build.result }} |"
                    echo "| Chromium smoke and axe | ${{ needs.smoke.result }} |"
                    echo
                    echo "Full desktop-browser and Lighthouse suites run after integration into main; extended device and visual suites run on the scheduled/manual pipeline."
                  } >> "$GITHUB_STEP_SUMMARY"
