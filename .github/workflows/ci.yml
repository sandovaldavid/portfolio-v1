name: Continuous Integration

on:
    pull_request:
        branches: [main]

permissions:
    contents: write

concurrency:
    group: pr-quality-${{ github.event.pull_request.number }}
    cancel-in-progress: true

jobs:
    rebuild-issue-133:
        name: Rebuild issue 133 branch from main
        if: github.actor != 'github-actions[bot]'
        runs-on: ubuntu-latest
        steps:
            - name: Checkout writable pull request branch
              uses: actions/checkout@v7
              with:
                  ref: ${{ github.event.pull_request.head.ref }}
                  fetch-depth: 0

            - name: Setup repository
              uses: ./.github/actions/setup-bun

            - name: Restore issue 133 implementation
              shell: bash
              env:
                  OLD_HEAD: a1b3dcc03540d7e43f938d6d7d22e5f6d84c9f6a
              run: |
                  set -euo pipefail
                  git fetch origin "${OLD_HEAD}"
                  git checkout "${OLD_HEAD}" -- \
                    docs/I18N-CATALOGS.md \
                    docs/README.md \
                    scripts/prepare-issue-133-repair.py \
                    src/app/layouts/Layout.astro \
                    src/features/cli-terminal/index.ts \
                    src/features/cli-terminal/model/runtime.ts \
                    src/features/cli-terminal/ui/CLITerminalCatalog.astro \
                    src/features/language-picker/ui/LanguagePicker.astro \
                    src/features/splash-screen/ui/SplashScreen.astro \
                    src/features/theme-toggle/ui/ThemeToggle.astro \
                    src/pages/404.astro \
                    src/shared/config/i18n/catalog.ts \
                    src/shared/config/i18n/index.ts \
                    src/shared/config/i18n/locales/en/accessibility.json \
                    src/shared/config/i18n/locales/en/breadcrumbs.json \
                    src/shared/config/i18n/locales/en/cli.json \
                    src/shared/config/i18n/locales/en/common.json \
                    src/shared/config/i18n/locales/en/errors.json \
                    src/shared/config/i18n/locales/en/footer.json \
                    src/shared/config/i18n/locales/en/navigation.json \
                    src/shared/config/i18n/locales/en/recruiter.json \
                    src/shared/config/i18n/locales/en/sections/about.json \
                    src/shared/config/i18n/locales/en/sections/hero.json \
                    src/shared/config/i18n/locales/en/sections/research.json \
                    src/shared/config/i18n/locales/en/sections/tech-stack.json \
                    src/shared/config/i18n/locales/en/sections/vision.json \
                    src/shared/config/i18n/locales/en/splash.json \
                    src/shared/config/i18n/locales/en/theme.json \
                    src/shared/config/i18n/locales/es/accessibility.json \
                    src/shared/config/i18n/locales/es/breadcrumbs.json \
                    src/shared/config/i18n/locales/es/cli.json \
                    src/shared/config/i18n/locales/es/common.json \
                    src/shared/config/i18n/locales/es/errors.json \
                    src/shared/config/i18n/locales/es/footer.json \
                    src/shared/config/i18n/locales/es/navigation.json \
                    src/shared/config/i18n/locales/es/recruiter.json \
                    src/shared/config/i18n/locales/es/sections/about.json \
                    src/shared/config/i18n/locales/es/sections/hero.json \
                    src/shared/config/i18n/locales/es/sections/research.json \
                    src/shared/config/i18n/locales/es/sections/tech-stack.json \
                    src/shared/config/i18n/locales/es/sections/vision.json \
                    src/shared/config/i18n/locales/es/splash.json \
                    src/shared/config/i18n/locales/es/theme.json \
                    src/shared/config/i18n/types.ts \
                    src/widgets/contact-sidebar/ui/ContactSidebar.astro \
                    src/widgets/experience/ui/Experience.astro \
                    src/widgets/footer/ui/Footer.astro \
                    src/widgets/header/ui/DesktopNav.astro \
                    src/widgets/header/ui/Header.astro \
                    src/widgets/header/ui/MobileNav.astro \
                    src/widgets/recruiter-hud/ui/RecruiterHUD.astro \
                    tests/e2e/i18n-shell.spec.ts \
                    tests/unit/i18n-catalog.spec.ts \
                    tests/unit/i18n-shell-migration.spec.ts
                  rm -f src/features/cli-terminal/ui/CLITerminal.astro
                  python scripts/prepare-issue-133-repair.py
                  rm scripts/prepare-issue-133-repair.py
                  git checkout origin/main -- .github/workflows/ci.yml
                  bun run format

            - name: Capture reconstruction validation
              shell: bash
              run: |
                  mkdir -p issue-133-diagnostics
                  set +e
                  bun run check > issue-133-diagnostics/check.log 2>&1
                  echo "$?" > issue-133-diagnostics/check.exit
                  bun run test:unit:ci > issue-133-diagnostics/unit.log 2>&1
                  echo "$?" > issue-133-diagnostics/unit.exit
                  bun run build > issue-133-diagnostics/build.log 2>&1
                  echo "$?" > issue-133-diagnostics/build.exit
                  git diff --check > issue-133-diagnostics/diff-check.log 2>&1
                  echo "$?" > issue-133-diagnostics/diff-check.exit
                  exit 0

            - name: Upload reconstruction diagnostics
              uses: actions/upload-artifact@v7
              with:
                  name: issue-133-rebuild-diagnostics
                  path: issue-133-diagnostics/
                  if-no-files-found: error
                  retention-days: 1

            - name: Require successful reconstruction
              shell: bash
              run: |
                  set -euo pipefail
                  test "$(cat issue-133-diagnostics/check.exit)" = "0"
                  test "$(cat issue-133-diagnostics/unit.exit)" = "0"
                  test "$(cat issue-133-diagnostics/build.exit)" = "0"
                  test "$(cat issue-133-diagnostics/diff-check.exit)" = "0"

            - name: Commit clean reconstruction
              shell: bash
              run: |
                  set -euo pipefail
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git add -A
                  git commit -m "refactor(i18n): rebuild shared shell migration on main"
                  git push origin HEAD:${{ github.event.pull_request.head.ref }}
