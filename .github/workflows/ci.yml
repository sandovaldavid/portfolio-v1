name: Continuous Integration

on:
    pull_request:
        branches: [main]

permissions:
    contents: write

concurrency:
    group: pr-quality-${{ github.event.pull_request.number }}
    cancel-in-progress: true

jobs:
    format-issue-134:
        name: Format newly tracked issue 134 files
        if: github.actor != 'github-actions[bot]'
        runs-on: ubuntu-latest
        steps:
            - name: Checkout writable pull request branch
              uses: actions/checkout@v7
              with:
                  ref: ${{ github.event.pull_request.head.ref }}
                  fetch-depth: 0

            - name: Setup repository
              uses: ./.github/actions/setup-bun

            - name: Format final tracked tree
              run: |
                  bun run format
                  git checkout origin/main -- .github/workflows/ci.yml

            - name: Commit formatter output
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git add -A
                  git commit -m "style(i18n): format home catalog migration"
                  git push origin HEAD:${{ github.event.pull_request.head.ref }}
