name: Build and Push Dev Container

on:
  push:
    branches:
      - main
      - develop
    paths:
      - '.devcontainer/**'
      - '.github/workflows/build-devcontainer.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - '.devcontainer/**'
      - '.github/workflows/build-devcontainer.yml'
  workflow_dispatch: # Allows manual trigger from GitHub UI

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Downcase repository name for Docker image path
        run: |
          echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}/devcontainer" >> $GITHUB_ENV

      - name: Build and push Dev Container to GHCR
        uses: devcontainers/ci@v1
        with:
          imageName: ${{ env.IMAGE_NAME }}
          # Tags the image with the branch name (e.g., develop, main) and the commit SHA
          imageTag: ${{ github.ref_name }},${{ github.sha }}
          push: ${{ github.event_name == 'push' && 'always' || 'never' }}
