name: Build and Validate Dev Container

on:
    push:
        branches:
            - main
        paths:
            - '.devcontainer/**'
            - '.github/workflows/build-devcontainer.yml'
            - '.husky/pre-commit'
            - '.prettierignore'
            - 'docker-compose.yml'
            - 'docker-test.sh'
            - 'eslint.config.js'
            - 'package.json'
            - 'bun.lock'
            - 'scripts/check-devcontainer.mjs'
            - 'scripts/format-tracked-files.mjs'
            - 'scripts/run-playwright.mjs'
    pull_request:
        branches:
            - main
        paths:
            - '.devcontainer/**'
            - '.github/workflows/build-devcontainer.yml'
            - '.husky/pre-commit'
            - '.prettierignore'
            - 'docker-compose.yml'
            - 'docker-test.sh'
            - 'eslint.config.js'
            - 'package.json'
            - 'bun.lock'
            - 'scripts/check-devcontainer.mjs'
            - 'scripts/format-tracked-files.mjs'
            - 'scripts/run-playwright.mjs'
    workflow_dispatch:

permissions:
    contents: read
    packages: write

concurrency:
    group: devcontainer-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

jobs:
    build-validate-and-push:
        runs-on: ubuntu-24.04
        steps:
            - name: Checkout repository
              uses: actions/checkout@v7

            - name: Log in to GitHub Container Registry
              if: github.event_name == 'push'
              uses: docker/login-action@v4
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Resolve development image name
              run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}/devcontainer" >> "$GITHUB_ENV"

            - name: Build, validate and optionally publish development container
              uses: devcontainers/ci@v0.3
              with:
                  imageName: ${{ env.IMAGE_NAME }}
                  imageTag: ${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.number) || github.ref_name }},${{ github.sha }}
                  cacheFrom: ${{ env.IMAGE_NAME }}
                  push: ${{ github.event_name == 'push' && 'always' || 'never' }}
                  runCmd: |
                      test "$PWD" = "/workspaces/portfolio-v1"

                      echo "Verify Linux workspace identity alignment"
                      test "$(id -u)" = "$(stat -c '%u' "$PWD")"
                      test -w "$PWD"

                      awk -v target="$PWD/node_modules" '$5 == target { found = 1 } END { exit !found }' /proc/self/mountinfo
                      test -w node_modules
                      test -n "$HOST_WORKSPACE_FOLDER"

                      echo "Create stale dependency volume fixture"
                      sudo rm -f node_modules/.devcontainer-volume-state
                      sudo mkdir -p node_modules/.vite-temp/inherited
                      sudo touch node_modules/.vite-temp/stale-config.mjs node_modules/.vite-temp/inherited/state
                      sudo chown -R 12345:12345 node_modules
                      sudo chmod -R u+rwX,go-rX node_modules

                      echo "Create stale Git metadata fixture"
                      sudo touch .git/FETCH_HEAD
                      sudo chown root:root .git/FETCH_HEAD
                      sudo chmod 600 .git/FETCH_HEAD

                      echo "Create stale generated ownership fixtures"
                      sudo rm -rf .astro playwright-report test-results .docker
                      sudo mkdir -p .astro/collections playwright-report test-results .docker/runtime/home/.cache/dconf .docker/runtime/node_modules
                      sudo touch .astro/content.d.ts playwright-report/index.html test-results/.last-run.json test-results.json junit-results.xml
                      sudo chown -R root:root .astro playwright-report test-results test-results.json junit-results.xml .docker
                      sudo chmod -R go-rwx .astro playwright-report test-results .docker

                      bash .devcontainer/repair-workspace-permissions.sh
                      test "$(cat node_modules/.devcontainer-volume-state)" = "schema=1 uid=$(id -u) gid=$(id -g)"
                      test "$(stat -c '%u:%g' node_modules/.vite-temp/stale-config.mjs)" = "$(id -u):$(id -g)"
                      test -w node_modules/.vite-temp
                      test -w "$(git rev-parse --absolute-git-dir)/FETCH_HEAD"
                      test -w .astro
                      test -w playwright-report
                      test -w test-results
                      test -w test-results.json
                      test -w junit-results.xml
                      test -w .docker/runtime/node_modules
                      test -w .docker/runtime/home

                      echo "Create hostile nested ESLint fixture"
                      mkdir -p .docker/runtime/home/.bun/install/cache/hostile-package
                      cat > .docker/runtime/home/.bun/install/cache/hostile-package/eslint.config.mjs <<'EOF'
                      import 'package-that-must-never-be-resolved-from-docker-runtime';
                      export default [];
                      EOF

                      echo "Create hostile Prettier traversal fixture"
                      sudo mkdir -p .docker/runtime/home/.cache/dconf/unreadable
                      sudo touch .docker/runtime/home/.cache/dconf/unreadable/state
                      sudo chown -R root:root .docker/runtime/home/.cache/dconf
                      sudo chmod 000 .docker/runtime/home/.cache/dconf

                      bun install --frozen-lockfile
                      bun install --frozen-lockfile
                      bun --version
                      bunx playwright --version
                      bun run lint:fix
                      bun run format
                      sh .husky/pre-commit
                      git diff --exit-code

                      bash .devcontainer/repair-workspace-permissions.sh
                      bun run check
                      bun run test:unit:ci
                      bun run build

                      echo "Recreate stale Playwright output before the direct smoke command"
                      sudo rm -rf test-results
                      sudo mkdir -p test-results
                      sudo touch test-results/.last-run.json
                      sudo chown -R root:root test-results
                      sudo chmod -R go-rwx test-results
                      bun run test:e2e:smoke

                      VERIFY_DOCKER_WORKSPACE_ONLY=true bash docker-test.sh
                      docker --version
                      docker compose version
                      docker info
