name: Apply FSD architecture migration

on:
  push:
    branches:
      - refactor/enforce-fsd-boundaries

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v7
        with:
          ref: refactor/enforce-fsd-boundaries
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Apply architecture migration
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path
          import json
          import re
          import shutil

          ROOT = Path.cwd()

          def read(path: str) -> str:
              return (ROOT / path).read_text(encoding='utf-8')

          def write(path: str, content: str) -> None:
              target = ROOT / path
              target.parent.mkdir(parents=True, exist_ok=True)
              target.write_text(content, encoding='utf-8')

          def replace_exact(path: str, old: str, new: str, expected: int = 1) -> None:
              content = read(path)
              count = content.count(old)
              if count != expected:
                  raise RuntimeError(f"{path}: expected {expected} occurrence(s), found {count} for {old!r}")
              write(path, content.replace(old, new))

          # Layout defaults to internal-page rendering. Home routes opt in explicitly.
          replace_exact('src/app/layouts/Layout.astro', '\tisHome = true,', '\tisHome = false,')
          replace_exact(
              'src/app/layouts/Layout.astro',
              "import { Header, Footer, TechStack, RecruiterHUD, ContactSidebar } from '@widgets';",
              "\n".join([
                  "import { ContactSidebar } from '@widgets/contact-sidebar';",
                  "import { Footer } from '@widgets/footer';",
                  "import { Header } from '@widgets/header';",
                  "import { RecruiterHUD } from '@widgets/recruiter-hud';",
                  "import { TechStack } from '@widgets/tech-stack';",
              ]),
          )

          for page_path in ['src/pages/index.astro', 'src/pages/es/index.astro']:
              replace_exact(
                  page_path,
                  "import { Experience, Projects, AboutMe, Hero, Research } from '@widgets';",
                  "\n".join([
                      "import { AboutMe } from '@widgets/about-me';",
                      "import { Experience } from '@widgets/experience';",
                      "import { Hero } from '@widgets/hero';",
                      "import { Projects } from '@widgets/projects';",
                      "import { Research } from '@widgets/research';",
                  ]),
              )
              replace_exact(
                  page_path,
                  '\timg_preview="/projects/portfolio.webp"\n>',
                  '\timg_preview="/projects/portfolio.webp"\n\tisHome\n>',
              )

          for page_path in [
              'src/pages/about.astro',
              'src/pages/es/about.astro',
              'src/pages/projects.astro',
              'src/pages/es/projects.astro',
          ]:
              replace_exact(page_path, '\n\tisHome={false}', '')

          # Move the technology vocabulary out of entities and update all source consumers.
          technology_source = ROOT / 'src/entities/technology'
          technology_target = ROOT / 'src/shared/config/technology'
          technology_target.mkdir(parents=True, exist_ok=True)
          shutil.move(str(technology_source / 'model/data.ts'), str(technology_target / 'data.ts'))
          shutil.move(str(technology_source / 'model/types.ts'), str(technology_target / 'types.ts'))
          write(
              'src/shared/config/technology/index.ts',
              "export { TAGS } from './data';\nexport type { Technology, TechnologyKey, TechnologyTags } from './types';\n",
          )
          shutil.rmtree(technology_source)

          for source_path in (ROOT / 'src').rglob('*'):
              if source_path.suffix not in {'.astro', '.js', '.mjs', '.ts', '.tsx'}:
                  continue
              content = source_path.read_text(encoding='utf-8')
              if '@entities/technology' in content:
                  source_path.write_text(
                      content.replace('@entities/technology', '@shared/config/technology'),
                      encoding='utf-8',
                  )

          # Remove catch-all/dead aliases while preserving semantic layer aliases.
          tsconfig_path = ROOT / 'tsconfig.json'
          tsconfig = json.loads(tsconfig_path.read_text(encoding='utf-8'))
          paths = tsconfig['compilerOptions']['paths']
          for alias in ['@/*', '@components/*', '@pages/*', '@styles/*', '@widgets']:
              paths.pop(alias, None)
          tsconfig_path.write_text(json.dumps(tsconfig, indent='\t', ensure_ascii=False) + '\n', encoding='utf-8')

          vitest_path = ROOT / 'vitest.config.ts'
          vitest = vitest_path.read_text(encoding='utf-8')
          vitest = vitest.replace("\n\t\t\t'@': path.resolve(root, 'src'),", '')
          vitest_path.write_text(vitest, encoding='utf-8')

          widgets_barrel = ROOT / 'src/widgets/index.ts'
          if widgets_barrel.exists():
              widgets_barrel.unlink()

          # Integrate executable architecture validation into the canonical lint command.
          replace_exact(
              'package.json',
              '\t\t"lint": "eslint .",\n\t\t"lint:fix": "eslint . --fix",',
              '\n'.join([
                  '\t\t"lint:eslint": "eslint .",',
                  '\t\t"lint:architecture": "node scripts/check-architecture.mjs",',
                  '\t\t"lint": "bun run lint:eslint && bun run lint:architecture",',
                  '\t\t"lint:fix": "eslint . --fix && bun run lint:architecture",',
              ]),
          )

          write('scripts/architecture-rules.mjs', """import path from 'node:path';
          import ts from 'typescript';

          export const ARCHITECTURE_LAYERS = Object.freeze({
          \tpages: 5,
          \tapp: 4,
          \twidgets: 3,
          \tfeatures: 2,
          \tentities: 1,
          \tshared: 0,
          });

          const STRICT_SLICE_LAYERS = new Set(['widgets', 'features', 'entities']);
          const SOURCE_LAYERS = new Set(Object.keys(ARCHITECTURE_LAYERS));
          const KNOWN_FILE_EXTENSIONS = new Set([
          \t'.astro',
          \t'.cjs',
          \t'.css',
          \t'.gif',
          \t'.jpeg',
          \t'.jpg',
          \t'.js',
          \t'.json',
          \t'.md',
          \t'.mdx',
          \t'.mjs',
          \t'.png',
          \t'.svg',
          \t'.ts',
          \t'.tsx',
          \t'.webp',
          ]);

          const ALIASES = [
          \t{ alias: '@pages', layer: 'pages', root: 'src/pages', retired: true },
          \t{ alias: '@app', layer: 'app', root: 'src/app' },
          \t{ alias: '@widgets', layer: 'widgets', root: 'src/widgets' },
          \t{ alias: '@features', layer: 'features', root: 'src/features' },
          \t{ alias: '@entities', layer: 'entities', root: 'src/entities' },
          \t{ alias: '@shared', layer: 'shared', root: 'src/shared' },
          \t{ alias: '@components', layer: null, root: 'src/components', retired: true },
          \t{ alias: '@styles', layer: null, root: 'src/styles', retired: true },
          \t{ alias: '@assets', layer: null, root: 'src/assets' },
          ];

          /**
           * @typedef {{ specifier: string; line: number }} ImportReference
           * @typedef {{ importer: string; specifier: string; rootDir?: string }} ImportValidationInput
           */

          /** @param {string} value */
          function normalizePath(value) {
          \treturn value.replaceAll(path.sep, '/');
          }

          /** @param {string} filePath */
          export function getLayerFromFile(filePath) {
          \tconst normalized = normalizePath(filePath);
          \tconst match = normalized.match(/(?:^|\\/)src\\/(pages|app|widgets|features|entities|shared)(?:\\/|$)/);
          \treturn match?.[1] ?? null;
          }

          /** @param {string} filePath */
          export function getSliceFromFile(filePath) {
          \tconst normalized = normalizePath(filePath);
          \tconst segments = normalized.split('/');
          \tconst srcIndex = segments.lastIndexOf('src');
          \tconst layer = srcIndex >= 0 ? segments[srcIndex + 1] : undefined;

          \tif (!layer || !STRICT_SLICE_LAYERS.has(layer)) {
          \t\treturn null;
          \t}

          \treturn segments[srcIndex + 2] ?? null;
          }

          /** @param {string} specifier */
          export function getAliasInfo(specifier) {
          \treturn (
          \t\tALIASES.find(({ alias }) => specifier === alias || specifier.startsWith(`${alias}/`)) ?? null
          \t);
          }

          /** @param {string} specifier */
          function getAliasSegments(specifier, alias) {
          \treturn specifier
          \t\t.slice(alias.length)
          \t\t.split('/')
          \t\t.filter(Boolean);
          }

          /** @param {string} source @param {string} filePath */
          export function extractImportSpecifiers(source, filePath) {
          \tconst isAstro = filePath.endsWith('.astro');
          \tconst frontmatter = isAstro
          \t\t? source.match(/^\\s*---\\r?\\n([\\s\\S]*?)\\r?\\n---/)?.[1] ?? ''
          \t\t: source;
          \tconst lineOffset = isAstro ? 1 : 0;
          \tconst scriptKind = filePath.endsWith('.tsx')
          \t\t? ts.ScriptKind.TSX
          \t\t: filePath.endsWith('.jsx')
          \t\t\t? ts.ScriptKind.JSX
          \t\t\t: ts.ScriptKind.TS;
          \tconst sourceFile = ts.createSourceFile(
          \t\tfilePath,
          \t\tfrontmatter,
          \t\tts.ScriptTarget.Latest,
          \t\ttrue,
          \t\tscriptKind
          \t);
          \t/** @type {ImportReference[]} */
          \tconst references = [];

          \t/** @param {ts.Node} node @param {ts.Expression | undefined} moduleSpecifier */
          \tconst addReference = (node, moduleSpecifier) => {
          \t\tif (!moduleSpecifier || !ts.isStringLiteralLike(moduleSpecifier)) {
          \t\t\treturn;
          \t\t}

          \t\tconst position = sourceFile.getLineAndCharacterOfPosition(node.getStart(sourceFile));
          \t\treferences.push({
          \t\t\tspecifier: moduleSpecifier.text,
          \t\t\tline: position.line + 1 + lineOffset,
          \t\t});
          \t};

          \t/** @param {ts.Node} node */
          \tconst visit = node => {
          \t\tif (ts.isImportDeclaration(node) || ts.isExportDeclaration(node)) {
          \t\t\taddReference(node, node.moduleSpecifier);
          \t\t}

          \t\tif (
          \t\t\tts.isCallExpression(node) &&
          \t\t\tnode.expression.kind === ts.SyntaxKind.ImportKeyword &&
          \t\t\tnode.arguments.length === 1
          \t\t) {
          \t\t\taddReference(node, node.arguments[0]);
          \t\t}

          \t\tts.forEachChild(node, visit);
          \t};

          \tvisit(sourceFile);
          \treturn references;
          }

          /** @param {ImportValidationInput} input */
          export function validateImport({ importer, specifier, rootDir = process.cwd() }) {
          \t/** @type {string[]} */
          \tconst problems = [];
          \tconst importerLayer = getLayerFromFile(importer);

          \tif (specifier === '@' || specifier.startsWith('@/')) {
          \t\tproblems.push('The catch-all @ alias is forbidden; use a semantic layer alias.');
          \t\treturn problems;
          \t}

          \tif (specifier === '@widgets') {
          \t\tproblems.push('The root @widgets barrel is forbidden; import from a widget slice public API.');
          \t}

          \tconst aliasInfo = getAliasInfo(specifier);
          \tif (aliasInfo?.retired) {
          \t\tproblems.push(`The ${aliasInfo.alias} alias is retired and must not be used.`);
          \t}

          \tif (aliasInfo) {
          \t\tconst segments = getAliasSegments(specifier, aliasInfo.alias);

          \t\tif (STRICT_SLICE_LAYERS.has(aliasInfo.layer ?? '') && segments.length !== 1) {
          \t\t\tproblems.push(
          \t\t\t\t`Deep imports into ${aliasInfo.layer} are forbidden; import from @${aliasInfo.layer}/<slice>.`
          \t\t\t);
          \t\t}

          \t\tif (aliasInfo.layer === 'shared' && (segments.length === 0 || segments.length > 2)) {
          \t\t\tproblems.push(
          \t\t\t\t'Shared imports must target a segment or slice public API such as @shared/ui or @shared/lib/i18n.'
          \t\t\t);
          \t\t}

          \t\tif (
          \t\t\timporterLayer &&
          \t\t\taliasInfo.layer &&
          \t\t\tSOURCE_LAYERS.has(aliasInfo.layer) &&
          \t\t\tARCHITECTURE_LAYERS[aliasInfo.layer] > ARCHITECTURE_LAYERS[importerLayer]
          \t\t) {
          \t\t\tproblems.push(
          \t\t\t\t`${importerLayer} cannot import from the higher ${aliasInfo.layer} layer.`
          \t\t\t);
          \t\t}

          \t\tif (
          \t\t\timporterLayer &&
          \t\t\taliasInfo.layer === importerLayer &&
          \t\t\tSTRICT_SLICE_LAYERS.has(importerLayer)
          \t\t) {
          \t\t\tproblems.push(
          \t\t\t\t`Same-layer ${importerLayer} imports are forbidden; extract shared behavior to a lower layer.`
          \t\t\t);
          \t\t}
          \t}

          \tif (specifier.startsWith('.') && importerLayer) {
          \t\tconst absoluteTarget = path.resolve(rootDir, path.dirname(importer), specifier);
          \t\tconst relativeTarget = normalizePath(path.relative(rootDir, absoluteTarget));
          \t\tconst targetLayer = getLayerFromFile(relativeTarget);

          \t\tif (targetLayer && targetLayer !== importerLayer) {
          \t\t\tproblems.push('Relative imports cannot cross architecture layers; use a semantic alias.');
          \t\t}

          \t\tif (
          \t\t\ttargetLayer === importerLayer &&
          \t\t\tSTRICT_SLICE_LAYERS.has(importerLayer) &&
          \t\t\tgetSliceFromFile(relativeTarget) !== getSliceFromFile(importer)
          \t\t) {
          \t\t\tproblems.push(
          \t\t\t\t`Relative imports cannot cross ${importerLayer} slices; use a lower-layer abstraction.`
          \t\t\t);
          \t\t}
          \t}

          \treturn problems;
          }

          /** @param {string} specifier */
          export function getAliasCandidates(specifier) {
          \tconst aliasInfo = getAliasInfo(specifier);
          \tif (!aliasInfo || aliasInfo.retired) {
          \t\treturn [];
          \t}

          \tconst segments = getAliasSegments(specifier, aliasInfo.alias);
          \tconst repositoryPath = path.posix.join(aliasInfo.root, ...segments);
          \tconst extension = path.posix.extname(repositoryPath);

          \tif (KNOWN_FILE_EXTENSIONS.has(extension)) {
          \t\treturn [repositoryPath];
          \t}

          \treturn [
          \t\t`${repositoryPath}.ts`,
          \t\t`${repositoryPath}.tsx`,
          \t\t`${repositoryPath}.js`,
          \t\t`${repositoryPath}.mjs`,
          \t\t`${repositoryPath}.astro`,
          \t\t`${repositoryPath}.css`,
          \t\t`${repositoryPath}.json`,
          \t\tpath.posix.join(repositoryPath, 'index.ts'),
          \t\tpath.posix.join(repositoryPath, 'index.tsx'),
          \t\tpath.posix.join(repositoryPath, 'index.js'),
          \t\tpath.posix.join(repositoryPath, 'index.mjs'),
          \t];
          }
          """)
          write('scripts/check-architecture.mjs', """import fs from 'node:fs/promises';
          import path from 'node:path';
          import {
          \textractImportSpecifiers,
          \tgetAliasCandidates,
          \tgetLayerFromFile,
          \tvalidateImport,
          } from './architecture-rules.mjs';

          const rootDir = process.cwd();
          const sourceDir = path.join(rootDir, 'src');
          const sourceExtensions = new Set(['.astro', '.cjs', '.js', '.mjs', '.ts', '.tsx']);

          /** @param {string} directory */
          async function collectSourceFiles(directory) {
          \tconst entries = await fs.readdir(directory, { withFileTypes: true });
          \tconst nestedFiles = await Promise.all(
          \t\tentries.map(async entry => {
          \t\t\tconst target = path.join(directory, entry.name);
          \t\t\tif (entry.isDirectory()) {
          \t\t\t\treturn collectSourceFiles(target);
          \t\t\t}
          \t\t\treturn sourceExtensions.has(path.extname(entry.name)) ? [target] : [];
          \t\t})
          \t);
          \treturn nestedFiles.flat();
          }

          /** @param {string[]} candidates */
          async function hasPublicTarget(candidates) {
          \tfor (const candidate of candidates) {
          \t\ttry {
          \t\t\tconst stats = await fs.stat(path.join(rootDir, candidate));
          \t\t\tif (stats.isFile()) {
          \t\t\t\treturn true;
          \t\t\t}
          \t\t} catch {
          \t\t\t// Try the next candidate.
          \t\t}
          \t}
          \treturn false;
          }

          const files = await collectSourceFiles(sourceDir);
          const violations = [];
          let checkedImports = 0;
          let checkedFiles = 0;

          for (const absoluteFile of files) {
          \tconst importer = path.relative(rootDir, absoluteFile).replaceAll(path.sep, '/');
          \tif (!getLayerFromFile(importer)) {
          \t\tcontinue;
          \t}

          \tcheckedFiles += 1;
          \tconst source = await fs.readFile(absoluteFile, 'utf8');
          \tconst imports = extractImportSpecifiers(source, importer);

          \tfor (const reference of imports) {
          \t\tcheckedImports += 1;
          \t\tconst problems = validateImport({
          \t\t\timporter,
          \t\t\tspecifier: reference.specifier,
          \t\t\trootDir,
          \t\t});
          \t\tconst candidates = getAliasCandidates(reference.specifier);

          \t\tif (candidates.length > 0 && !(await hasPublicTarget(candidates))) {
          \t\t\tproblems.push(
          \t\t\t\t`Alias target does not expose a file or index public API. Checked: ${candidates.join(', ')}`
          \t\t\t);
          \t\t}

          \t\tfor (const problem of problems) {
          \t\t\tviolations.push({
          \t\t\t\tfile: importer,
          \t\t\t\tline: reference.line,
          \t\t\t\tspecifier: reference.specifier,
          \t\t\t\tproblem,
          \t\t\t});
          \t\t}
          \t}
          }

          if (violations.length > 0) {
          \tconsole.error('\nArchitecture boundary check failed:\n');
          \tfor (const violation of violations) {
          \t\tconsole.error(
          \t\t\t`- ${violation.file}:${violation.line} -> ${violation.specifier}\n  ${violation.problem}`
          \t\t);
          \t}
          \tconsole.error(`\n${violations.length} violation(s) found.`);
          \tprocess.exit(1);
          }

          console.log(
          \t`Architecture boundaries passed: ${checkedImports} imports checked across ${checkedFiles} source files.`
          );
          """)
          write('tests/unit/architecture/import-boundaries.spec.ts', """import { describe, expect, it } from 'vitest';
          import {
          \textractImportSpecifiers,
          \tvalidateImport,
          } from '../../../scripts/architecture-rules.mjs';

          const validate = (importer: string, specifier: string): string[] =>
          \tvalidateImport({ importer, specifier, rootDir: process.cwd() });

          describe('architecture import boundaries', () => {
          \tit('rejects upward imports', () => {
          \t\texpect(validate('src/entities/project/model/data.ts', '@features/theme-toggle')).toContain(
          \t\t\t'entities cannot import from the higher features layer.'
          \t\t);
          \t});

          \tit('rejects same-layer slice imports', () => {
          \t\texpect(validate('src/widgets/hero/ui/Hero.astro', '@widgets/footer')).toContain(
          \t\t\t'Same-layer widgets imports are forbidden; extract shared behavior to a lower layer.'
          \t\t);
          \t});

          \tit('rejects deep imports that bypass a slice public API', () => {
          \t\texpect(validate('src/pages/projects.astro', '@entities/project/model/data')).toContain(
          \t\t\t'Deep imports into entities are forbidden; import from @entities/<slice>.'
          \t\t);
          \t});

          \tit('rejects catch-all and retired aliases', () => {
          \t\texpect(validate('src/pages/index.astro', '@/widgets/hero')).toContain(
          \t\t\t'The catch-all @ alias is forbidden; use a semantic layer alias.'
          \t\t);
          \t\texpect(validate('src/pages/index.astro', '@components/Hero.astro')).toContain(
          \t\t\t'The @components alias is retired and must not be used.'
          \t\t);
          \t});

          \tit('rejects relative imports that cross layers or peer slices', () => {
          \t\texpect(validate('src/widgets/hero/ui/Hero.astro', '../../../shared/ui')).toContain(
          \t\t\t'Relative imports cannot cross architecture layers; use a semantic alias.'
          \t\t);
          \t\texpect(validate('src/entities/project/model/data.ts', '../../badge')).toContain(
          \t\t\t'Relative imports cannot cross entities slices; use a lower-layer abstraction.'
          \t\t);
          \t});

          \tit('allows the supported downward dependency flow', () => {
          \t\texpect(validate('src/pages/index.astro', '@app/layouts/Layout.astro')).toEqual([]);
          \t\texpect(validate('src/app/layouts/Layout.astro', '@widgets/header')).toEqual([]);
          \t\texpect(validate('src/widgets/header/ui/Header.astro', '@features/theme-toggle')).toEqual([]);
          \t\texpect(validate('src/entities/project/model/data.ts', '@shared/config/technology')).toEqual(
          \t\t\t[]
          \t\t);
          \t\texpect(validate('src/entities/project/model/data.ts', './types')).toEqual([]);
          \t});

          \tit('extracts static, exported and dynamic imports from Astro frontmatter', () => {
          \t\tconst source = `---
          import { Hero } from '@widgets/hero';
          export type { Project } from '@entities/project';
          const modulePromise = import('@shared/lib/i18n');
          ---
          <div />`;

          \t\texpect(extractImportSpecifiers(source, 'src/pages/index.astro')).toEqual([
          \t\t\t{ specifier: '@widgets/hero', line: 2 },
          \t\t\t{ specifier: '@entities/project', line: 3 },
          \t\t\t{ specifier: '@shared/lib/i18n', line: 4 },
          \t\t]);
          \t});
          });
          """)
          write('docs/ARCHITECTURE.md', """# Executable architecture rules

          This document is the active source of truth for the repository's pragmatic Feature-Sliced Design boundaries. Historical migration material under `docs/FSD-Architecture/` is archived and does not override these rules.

          ## Dependency direction

          Astro file-based routes are framework entry points, so they sit above application composition:

          ```text
          src/pages → app → widgets → features → entities → shared
          ```

          `src/assets` contains static resources and is not an architectural layer.

          - Route files may compose the app layout and any lower layer.
          - App composition may import widgets, features, entities and shared code.
          - Widgets may import features, entities and shared code.
          - Features may import entities and shared code.
          - Entities may import shared code only.
          - Shared code must not depend on product layers.

          ## Slice isolation and public APIs

          The following rules are executable through `bun run lint:architecture` and therefore through `bun run lint`, `bun run check` and CI:

          1. Widgets, features and entities cannot import another slice in the same layer.
          2. Cross-layer relative imports are forbidden.
          3. Cross-slice relative imports are forbidden in widgets, features and entities.
          4. Cross-layer imports use semantic aliases such as `@widgets/header` and `@entities/project`.
          5. Slice internals such as `/ui/`, `/model/` and `/lib/` are private; consumers import from the slice `index.ts`.
          6. Shared imports target a segment or slice public API such as `@shared/ui` or `@shared/lib/i18n`.
          7. The catch-all `@/` alias and the retired `@components`, `@pages` and `@styles` aliases are forbidden.
          8. The root `@widgets` barrel is forbidden because it hides slice ownership.

          Relative imports remain valid inside the same slice.

          ## Shared technology vocabulary

          Technology labels, icons and tag metadata are shared configuration at `src/shared/config/technology`. They are consumed by projects, pages and widgets but do not have independent domain behavior, so they are not an entity. This removes the former entity-to-entity dependency from `project` to `technology`.

          ## Layout safety

          `Layout.astro` defaults to an internal-page layout. Home routes must opt in with the explicit `isHome` prop. Omitting the prop therefore renders the default slot instead of the homepage-only named slots.

          Playwright regression tests assert that representative English and Spanish internal routes render one unique `<h1>` and do not render homepage sections.

          ## Growth policy

          The current layers are frozen. Do not add another architectural layer, cross-entity exception or root aggregate barrel unless real product complexity requires it. A change to these boundaries requires:

          1. a concrete use case that cannot be represented by the current layers;
          2. an ADR describing alternatives and trade-offs;
          3. an update to the executable checker and its tests.

          ## Commands

          ```bash
          bun run lint:architecture
          bun run lint
          bun run check
          ```

          When the checker reports a violation, move shared behavior downward or import through the target slice's public API. Do not add ad hoc exclusions.
          """)
          write('.github/instructions/05-entities-layer.instructions.md', """# Entities Layer Instructions

          The canonical architecture rules live in [`docs/ARCHITECTURE.md`](../../docs/ARCHITECTURE.md) and are enforced by `bun run lint:architecture`.

          ## Purpose

          Entities represent stable domain concepts with their own data, behavior or UI. Current examples include projects, professional experience, badges, blog posts and devlog posts.

          ## Executable rules

          - Entities may import shared code, static assets and external packages only.
          - An entity slice must not import another entity slice.
          - Cross-layer and cross-slice relative imports are forbidden.
          - Consumers import from `@entities/<slice>`, never from `/model`, `/ui`, `/lib` or `/api` internals.
          - Internal files within one entity slice use relative imports.
          - Shared vocabularies and configuration belong in `shared/config`, not in a synthetic entity.

          ## Technology vocabulary

          Technology labels, icons and tag metadata live at `src/shared/config/technology`. They are shared configuration consumed by projects, pages and widgets and do not justify an entity-to-entity exception.

          ## Example

          ```typescript
          import type { Technology } from '@shared/config/technology';
          import { getProjectsData } from '@entities/project';
          ```

          ```typescript
          // Forbidden: another entity and a deep import
          import type { Badge } from '@entities/badge';
          import { getProjectsData } from '@entities/project/model/data';
          ```

          ## Validation

          ```bash
          bun run lint:architecture
          bun run lint
          ```

          Do not add `@x` cross-entity exceptions. Move genuinely shared concepts into `shared`, or redesign the dependency so entities remain independent.
          """)

          # Add regression coverage for internal routes and the safe Layout default.
          pages_test = read('tests/e2e/pages.spec.ts')
          marker = "test.describe('Navigation between pages', () => {"
          if marker not in pages_test:
              raise RuntimeError('tests/e2e/pages.spec.ts: navigation marker not found')
          regression_block = '''const internalRouteExpectations = [
          \t{ path: '/about', heading: 'FULL BIOGRAPHY' },
          \t{ path: '/projects', heading: 'Projects Catalog' },
          \t{ path: '/es/about', heading: 'BIOGRAFÍA COMPLETA' },
          \t{ path: '/es/projects', heading: 'Catálogo de Proyectos' },
          ];

          test.describe('Internal route layout regression', () => {
          \tfor (const { path, heading } of internalRouteExpectations) {
          \t\ttest(`${path} renders its unique page content without homepage slots`, async ({ page }) => {
          \t\t\tawait page.goto(path);

          \t\t\tconst headings = page.locator('main h1');
          \t\t\tawait expect(headings).toHaveCount(1);
          \t\t\tawait expect(headings).toHaveText(heading);
          \t\t\tawait expect(page.locator('#experience')).toHaveCount(0);
          \t\t\tawait expect(page.locator('#technologies')).toHaveCount(0);
          \t\t});
          \t}
          });

          '''
          write('tests/e2e/pages.spec.ts', pages_test.replace(marker, regression_block + marker, 1))

          # Keep active documentation aligned with the executable rules.
          readme = read('README.md')
          old_readme = '''The source follows a pragmatic Feature-Sliced Design hierarchy:

          ```text
          app → pages → widgets → features → entities → shared
          ```

          Public APIs are exposed through slice entry points, and cross-layer imports use explicit aliases.'''
          new_readme = '''Astro route files are framework entry points above the application composition layers:

          ```text
          routes → app → widgets → features → entities → shared
          ```

          `bun run lint:architecture` enforces dependency direction, slice isolation, semantic aliases and public APIs. See [docs/ARCHITECTURE.md](docs/ARCHITECTURE.md) for the executable rules.'''
          if old_readme not in readme:
              raise RuntimeError('README.md architecture section not found')
          write('README.md', readme.replace(old_readme, new_readme, 1))

          readme_es = read('README.es.md')
          old_readme_es = '''La estructura sigue una adaptación pragmática de Feature-Sliced Design:

          ```text
          app → pages → widgets → features → entities → shared
          ```'''
          new_readme_es = '''Los archivos de rutas de Astro funcionan como puntos de entrada por encima de las capas de composición:

          ```text
          rutas → app → widgets → features → entities → shared
          ```

          `bun run lint:architecture` valida la dirección de dependencias, el aislamiento de slices, los aliases semánticos y las APIs públicas. Las reglas ejecutables están documentadas en [docs/ARCHITECTURE.md](docs/ARCHITECTURE.md).'''
          if old_readme_es not in readme_es:
              raise RuntimeError('README.es.md architecture section not found')
          write('README.es.md', readme_es.replace(old_readme_es, new_readme_es, 1))

          agents = read('AGENTS.md')
          agents = agents.replace(
              '[REQUIRED] All code must follow FSD rules:',
              '[REQUIRED] All code must follow the executable rules in `docs/ARCHITECTURE.md`. `bun run lint:architecture` is part of the canonical lint and CI gate:',
              1,
          )
          agents = agents.replace(
              '- **docs/FSD-Architecture/** - FSD details',
              '- **docs/ARCHITECTURE.md** - Active executable architecture rules\n- **docs/FSD-Architecture/** - Archived migration history',
              1,
          )
          write('AGENTS.md', agents)

          copilot = read('.github/copilot-instructions.md')
          copilot = re.sub(
              r'## Architecture Guidelines - Feature-Sliced Design \(FSD\)\n.*?\n## Technology Stack',
              '''## Architecture Guidelines - Feature-Sliced Design (FSD)

          The canonical architecture rules are documented in [`docs/ARCHITECTURE.md`](../docs/ARCHITECTURE.md) and enforced by `bun run lint:architecture`.

          - Astro route files compose the app and lower layers.
          - Dependencies flow through `app → widgets → features → entities → shared`.
          - Widgets, features and entities cannot import peer slices.
          - Consumers use semantic aliases and slice public APIs.
          - Catch-all aliases, root layer barrels and deep imports are forbidden.
          - Technology metadata is shared configuration at `src/shared/config/technology`.

          Do not duplicate the rule set here; update the canonical document and executable checker together.

          ## Technology Stack''',
              copilot,
              count=1,
              flags=re.S,
          )
          copilot = copilot.replace('entities/technology', 'shared/config/technology')
          write('.github/copilot-instructions.md', copilot)

          widgets_catalog = ROOT / 'docs/widgets-catalog.md'
          if widgets_catalog.exists():
              content = widgets_catalog.read_text(encoding='utf-8')
              widgets_catalog.write_text(
                  content.replace('@entities/technology', '@shared/config/technology'),
                  encoding='utf-8',
              )

          PY

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Format changed files
        shell: bash
        run: |
          bunx prettier --write \
            AGENTS.md \
            README.md \
            README.es.md \
            package.json \
            tsconfig.json \
            vitest.config.ts \
            scripts/architecture-rules.mjs \
            scripts/check-architecture.mjs \
            tests/unit/architecture/import-boundaries.spec.ts \
            tests/e2e/pages.spec.ts \
            docs/ARCHITECTURE.md \
            docs/widgets-catalog.md \
            .github/copilot-instructions.md \
            .github/instructions/05-entities-layer.instructions.md \
            src/app/layouts/Layout.astro \
            src/pages/index.astro \
            src/pages/es/index.astro \
            src/pages/about.astro \
            src/pages/es/about.astro \
            src/pages/projects.astro \
            src/pages/es/projects.astro \
            src/entities/project/model/data.ts \
            src/entities/project/model/types.ts \
            src/widgets/tech-stack/ui/TechStack.astro \
            src/pages/skills.astro \
            src/pages/es/skills.astro \
            src/pages/atena.astro \
            src/pages/es/atena.astro \
            src/shared/config/technology/*.ts

      - name: Preview architecture validation
        continue-on-error: true
        run: node scripts/check-architecture.mjs

      - name: Commit migration
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/architecture-migration.yml
          git add -A
          git commit --no-verify -m "refactor(architecture): enforce FSD boundaries"
          git push origin HEAD:refactor/enforce-fsd-boundaries
