name: Apply FSD architecture migration

on:
  pull_request:
    branches:
      - develop

permissions:
  contents: write

jobs:
  migrate:
    if: github.head_ref == 'refactor/enforce-fsd-boundaries'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout migration branch
        uses: actions/checkout@v7
        with:
          ref: refactor/enforce-fsd-boundaries
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Recover and apply migration script
        shell: bash
        run: |
          git show 52eb7395dc26cf890da05429543e8db6a8e97953:.github/workflows/architecture-migration.yml > /tmp/architecture-migration-source.yml
          sed -n "/python <<'PY'/,/^          PY$/p" /tmp/architecture-migration-source.yml \
            | sed '1d;$d;s/^          //' > /tmp/apply-architecture-migration.py
          test -s /tmp/apply-architecture-migration.py
          python /tmp/apply-architecture-migration.py

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Format migration diff
        shell: bash
        run: |
          git diff --name-only --diff-filter=ACM -z \
            | xargs -0 --no-run-if-empty bunx prettier --write

      - name: Preview architecture validation
        continue-on-error: true
        run: |
          bun run lint:architecture
          bun run test:unit tests/unit/architecture/import-boundaries.spec.ts

      - name: Commit migration and remove dispatcher
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/architecture-migration.yml
          git add -A
          git commit --no-verify -m "refactor(architecture): enforce FSD boundaries"
          git push origin HEAD:refactor/enforce-fsd-boundaries
