name: Deploy to Vercel Production

on:
    push:
        branches:
            - main

permissions:
    contents: read
    deployments: write

jobs:
    deploy:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: 1.3.14

            - name: Cache Bun global store
              uses: actions/cache@v4
              with:
                  path: ~/.bun/install/cache
                  key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
                  restore-keys: |
                      ${{ runner.os }}-bun-

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Pull Vercel Environment
              run: bunx vercel pull --yes --token=${{ secrets.VERCEL_TOKEN }}
              env:
                  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
                  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

            - name: Build Production
              run: bunx vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
              env:
                  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
                  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

            - name: Deploy to Production
              id: deploy
              run: |
                  DEPLOYMENT_URL=$(bunx vercel deploy --prebuilt --prod --yes --token=${{ secrets.VERCEL_TOKEN }})
                  echo "deployment_url=$DEPLOYMENT_URL" >> $GITHUB_OUTPUT
                  echo "✅ Successfully deployed to production: $DEPLOYMENT_URL"
              env:
                  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
                  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

            - name: Summary
              if: always()
              run: |
                  echo "## 🎉 Production Deployment" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
                  if [ "${{ job.status }}" == "success" ]; then
                    echo "✅ Successfully deployed to production!" >> $GITHUB_STEP_SUMMARY
                    echo "URL: https://sandovaldavid.com" >> $GITHUB_STEP_SUMMARY
                  else
                    echo "❌ Deployment failed. Please check the logs above." >> $GITHUB_STEP_SUMMARY
                  fi
