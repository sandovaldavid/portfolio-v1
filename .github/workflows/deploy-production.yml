name: Deploy to Vercel Production

on:
  push:
    branches:
      - main

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run linter
        run: bun run lint

      - name: Check formatting
        run: bun run format:check

      - name: Install Vercel CLI
        run: bun install -g vercel@latest

      - name: Pull Vercel Environment
        run: vercel pull --yes --team=team_Kni208cT03lJVCIgxVKQcVGt --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Production
        run: vercel build --prod --team=team_Kni208cT03lJVCIgxVKQcVGt --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Production
        id: deploy
        run: |
          DEPLOYMENT_URL=$(vercel deploy --prebuilt --prod --yes --team=team_Kni208cT03lJVCIgxVKQcVGt --token=${{ secrets.VERCEL_TOKEN }})
          echo "deployment_url=$DEPLOYMENT_URL" >> $GITHUB_OUTPUT
          echo "Deployment URL: $DEPLOYMENT_URL"

      - name: Promote to Production
        run: |
          echo "Promoting to production: ${{ steps.deploy.outputs.deployment_url }}"
          vercel promote ${{ steps.deploy.outputs.deployment_url }} --yes --team=team_Kni208cT03lJVCIgxVKQcVGt --token=${{ secrets.VERCEL_TOKEN }}

      - name: Summary
        if: always()
        run: |
          echo "## 🎉 Production Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Successfully deployed to production!" >> $GITHUB_STEP_SUMMARY
            echo "URL: https://sandovaldavid.com" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Deployment failed. Please check the logs above." >> $GITHUB_STEP_SUMMARY
          fi
