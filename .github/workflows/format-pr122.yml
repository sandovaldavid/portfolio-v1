name: Format PR 122

on:
    pull_request:
        branches: [develop]

permissions:
    contents: write

jobs:
    format:
        if: github.head_ref == 'ci/proportional-quality-pipelines'
        runs-on: ubuntu-latest
        steps:
            - name: Checkout pull request branch
              uses: actions/checkout@v7
              with:
                  ref: ${{ github.event.pull_request.head.ref }}
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: Setup repository
              uses: ./.github/actions/setup-bun

            - name: Format changed files
              run: |
                  bunx prettier --write \
                    .github/actions/setup-bun/action.yml \
                    .github/workflows/ci.yml \
                    .github/workflows/main-quality.yml \
                    .github/workflows/scheduled-quality.yml \
                    .github/workflows/codeql.yml \
                    package.json \
                    scripts/check-built-links.mjs \
                    tests/e2e/smoke.spec.ts \
                    tests/e2e/visual.spec.ts \
                    docs/CI.md \
                    docs/TESTING.md
                  rm .github/workflows/format-pr122.yml

            - name: Commit formatted result
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git add --all
                  git commit -m "style: format proportional quality pipelines"
                  git push
