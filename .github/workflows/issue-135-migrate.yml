name: Apply issue 135 migration

on:
    pull_request:
        branches: [main]

permissions:
    contents: write

concurrency:
    group: issue-135-${{ github.event.pull_request.number }}
    cancel-in-progress: true

jobs:
    migrate:
        if: github.event.pull_request.head.ref == 'feat/135-localized-profile-content'
        runs-on: ubuntu-latest
        steps:
            - name: Checkout writable pull request branch
              uses: actions/checkout@v7
              with:
                  ref: ${{ github.event.pull_request.head.ref }}
                  fetch-depth: 0

            - name: Setup repository
              uses: ./.github/actions/setup-bun

            - name: Apply localized profile migration
              run: python3 scripts/apply-issue-135.py

            - name: Format final tracked tree
              run: bun run format

            - name: Validate repository quality
              run: bun run check

            - name: Run unit tests
              run: bun run test:unit:ci

            - name: Build production output
              run: bun run build

            - name: Install Chromium
              run: bunx playwright install --with-deps chromium

            - name: Run smoke and accessibility tests
              run: bun run test:e2e:smoke

            - name: Validate patch whitespace
              run: git diff --check

            - name: Commit validated migration
              shell: bash
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git add -A
                  if git diff --cached --quiet; then
                    echo "No migration changes to commit."
                    exit 0
                  fi
                  git commit -m "feat(content): add localized profile sources"
                  git push origin HEAD:${{ github.event.pull_request.head.ref }}
