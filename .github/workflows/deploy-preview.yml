name: Deploy to Vercel Preview

on:
    push:
        branches: [develop]
    pull_request:
        branches: [main, develop]

permissions:
    contents: read
    deployments: write
    pull-requests: write

jobs:
    deploy:
        if: (github.event_name == 'push' || github.event_name == 'pull_request') && github.actor != 'dependabot[bot]'
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: 1.3.14

            - name: Cache Bun global store
              uses: actions/cache@v4
              with:
                  path: ~/.bun/install/cache
                  key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
                  restore-keys: |
                      ${{ runner.os }}-bun-

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Create GitHub Deployment
              id: gh-deploy
              if: github.event_name == 'pull_request'
              uses: actions/github-script@v7
              with:
                  script: |
                      const deploy = await github.rest.repos.createDeployment({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        ref: context.payload.pull_request.head.ref,
                        environment: 'Preview',
                        auto_merge: false,
                        required_contexts: [],
                        description: 'Vercel Preview',
                        transient_environment: true,
                      });
                      core.setOutput('deployment_id', deploy.data.id);

            - name: Set deployment status — in_progress
              if: github.event_name == 'pull_request'
              uses: actions/github-script@v7
              with:
                  script: |
                      await github.rest.repos.createDeploymentStatus({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        deployment_id: ${{ steps.gh-deploy.outputs.deployment_id }},
                        state: 'in_progress',
                        description: 'Deploying to Vercel…',
                      });

            - name: Pull Vercel Environment
              run: bunx vercel pull --yes --token=${{ secrets.VERCEL_TOKEN }}
              env:
                  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
                  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

            - name: Build
              run: bunx vercel build --token=${{ secrets.VERCEL_TOKEN }}
              env:
                  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
                  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

            - name: Deploy to Preview
              id: deploy
              run: |
                  PREVIEW_URL=$(bunx vercel deploy --prebuilt --yes --token=${{ secrets.VERCEL_TOKEN }})
                  echo "preview_url=$PREVIEW_URL" >> $GITHUB_OUTPUT
              env:
                  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
                  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

            - name: Set deployment status — success
              if: github.event_name == 'pull_request' && success()
              uses: actions/github-script@v7
              with:
                  script: |
                      await github.rest.repos.createDeploymentStatus({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        deployment_id: ${{ steps.gh-deploy.outputs.deployment_id }},
                        state: 'success',
                        environment_url: '${{ steps.deploy.outputs.preview_url }}',
                        description: 'Deployed to Vercel Preview',
                        log_url: 'https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}',
                      });

            - name: Set deployment status — failure
              if: github.event_name == 'pull_request' && failure()
              uses: actions/github-script@v7
              with:
                  script: |
                      await github.rest.repos.createDeploymentStatus({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        deployment_id: ${{ steps.gh-deploy.outputs.deployment_id }},
                        state: 'failure',
                        description: 'Deployment failed',
                        log_url: 'https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}',
                      });

            - name: Create or update PR comment
              if: github.event_name == 'pull_request' && success()
              uses: actions/github-script@v7
              with:
                  script: |
                      const MARKER = '<!-- deploy-preview-comment -->';
                      const sha = '${{ github.sha }}'.slice(0, 7);
                      const body = [
                        MARKER,
                        '### 🚀 Vista Previa de Despliegue',
                        '',
                        `| Detalle | Valor |`,
                        `|---|---|`,
                        `| **Preview URL** | [${{ steps.deploy.outputs.preview_url }}](${{ steps.deploy.outputs.preview_url }}) |`,
                        `| **Commit** | \`${sha}\` |`,
                        '',
                        '_Se actualiza automáticamente en cada push._',
                      ].join('\n');

                      const { data: comments } = await github.rest.issues.listComments({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        issue_number: context.issue.number,
                      });

                      const existing = comments.find(c => c.body.includes(MARKER));

                      if (existing) {
                        await github.rest.issues.updateComment({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          comment_id: existing.id,
                          body,
                        });
                      } else {
                        await github.rest.issues.createComment({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          issue_number: context.issue.number,
                          body,
                        });
                      }

            - name: Summary
              if: always()
              run: |
                  echo "## 🚀 Preview Deployment" >> $GITHUB_STEP_SUMMARY
                  echo "Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
                  if [ -n "${{ steps.deploy.outputs.preview_url }}" ]; then
                    echo "Preview URL: ${{ steps.deploy.outputs.preview_url }}" >> $GITHUB_STEP_SUMMARY
                  fi
