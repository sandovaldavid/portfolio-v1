name: Deploy to Vercel Preview

on:
    pull_request:
        branches: [main]
        types: [opened, synchronize, reopened]

permissions:
    contents: read
    deployments: write
    pull-requests: write

concurrency:
    group: vercel-preview-${{ github.event.pull_request.number }}
    cancel-in-progress: true

jobs:
    deploy:
        if: github.actor != 'dependabot[bot]'
        runs-on: ubuntu-latest
        environment:
            name: Preview
            url: ${{ steps.deploy.outputs.preview_url }}
        steps:
            - name: Checkout pull request head
              uses: actions/checkout@v7
              with:
                  ref: ${{ github.event.pull_request.head.sha }}

            - name: Setup repository
              uses: ./.github/actions/setup-bun

            - name: Pull Vercel preview environment
              run: bunx vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
              env:
                  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
                  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

            - name: Build preview
              run: bunx vercel build --token=${{ secrets.VERCEL_TOKEN }}
              env:
                  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
                  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

            - name: Deploy preview
              id: deploy
              run: |
                  PREVIEW_URL=$(bunx vercel deploy --prebuilt --yes --token=${{ secrets.VERCEL_TOKEN }})
                  echo "preview_url=$PREVIEW_URL" >> "$GITHUB_OUTPUT"
              env:
                  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
                  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

            - name: Create or update PR comment
              if: success()
              uses: actions/github-script@v9
              with:
                  script: |
                      const marker = '<!-- deploy-preview-comment -->';
                      const sha = context.payload.pull_request.head.sha.slice(0, 7);
                      const body = [
                        marker,
                        '### Vercel Preview',
                        '',
                        '| Detail | Value |',
                        '|---|---|',
                        `| Preview URL | [${{ steps.deploy.outputs.preview_url }}](${{ steps.deploy.outputs.preview_url }}) |`,
                        `| Pull request head | \`${sha}\` |`,
                        '',
                        '_Updated automatically for each pull request head._',
                      ].join('\n');

                      const { data: comments } = await github.rest.issues.listComments({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        issue_number: context.issue.number,
                      });

                      const existing = comments.find(comment => comment.body?.includes(marker));

                      if (existing) {
                        await github.rest.issues.updateComment({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          comment_id: existing.id,
                          body,
                        });
                      } else {
                        await github.rest.issues.createComment({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          issue_number: context.issue.number,
                          body,
                        });
                      }

            - name: Summary
              if: always()
              run: |
                  echo "## Vercel Preview" >> "$GITHUB_STEP_SUMMARY"
                  echo "Status: ${{ job.status }}" >> "$GITHUB_STEP_SUMMARY"
                  echo "Source SHA: ${{ github.event.pull_request.head.sha }}" >> "$GITHUB_STEP_SUMMARY"
                  if [ -n "${{ steps.deploy.outputs.preview_url }}" ]; then
                    echo "Preview URL: ${{ steps.deploy.outputs.preview_url }}" >> "$GITHUB_STEP_SUMMARY"
                  fi
