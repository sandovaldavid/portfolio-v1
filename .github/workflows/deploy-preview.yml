name: Deploy to Vercel Preview

on:
  pull_request:
    branches: [develop]

permissions:
  contents: write

jobs:
  migrate-toolchain:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: agent/standardize-project-toolchain
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Update documentation policy
        run: |
          python <<'PY'
          from pathlib import Path

          readme = Path('README.md')
          readme.write_text(readme.read_text().replace(
              '- Bun\n- Git',
              '- Bun 1.3.14 (declared by `packageManager` in `package.json`)\n- Git',
          ))

          readme_es = Path('README.es.md')
          readme_es.write_text(readme_es.read_text().replace(
              '- Bun\n- Git',
              '- Bun 1.3.14 (declarado en `packageManager` dentro de `package.json`)\n- Git',
          ))

          contributing = Path('CONTRIBUTING.md')
          text = contributing.read_text().replace(
              '- Bun ≥1.3.14',
              '- Bun 1.3.14 (use the version declared in `package.json`)',
          )
          policy = '''### Toolchain and dependency policy

- Bun is pinned exactly through `packageManager` and every GitHub Actions workflow.
- `package.json` uses compatible ranges for routine dependencies and exact versions for compatibility-sensitive packages.
- Build, formatting, type-checking and test-only packages belong in `devDependencies`.
- `bun.lock` is committed and CI installs with `bun install --frozen-lockfile`.
- Historical `porfolio-dev-*` tags remain unchanged; future releases use the corrected `portfolio-v1` identifier.

'''
          marker = '---\n\n## Development Workflow'
          if policy not in text:
              text = text.replace(marker, policy + marker)
          contributing.write_text(text)
          PY

      - name: Regenerate lockfile with pinned Bun
        run: |
          bun install --lockfile-only
          bun install --frozen-lockfile

      - name: Restore full workflows with pinned Bun
        run: |
          git show origin/develop:.github/workflows/ci.yml > .github/workflows/ci.yml
          git show origin/develop:.github/workflows/deploy-preview.yml > .github/workflows/deploy-preview.yml
          sed -i 's/bun-version: latest/bun-version: 1.3.14/g' .github/workflows/ci.yml
          sed -i 's/bun-version: latest/bun-version: 1.3.14/g' .github/workflows/deploy-preview.yml
          rm -f .github/workflows/toolchain-migration.yml

      - name: Format changed files
        run: bunx prettier --write package.json bun.lock release-please-config.json README.md README.es.md CONTRIBUTING.md .github/workflows/ci.yml .github/workflows/codeql.yml .github/workflows/deploy-preview.yml .github/workflows/deploy-production.yml

      - name: Verify build
        run: bun run build

      - name: Commit final migration
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add package.json bun.lock release-please-config.json README.md README.es.md CONTRIBUTING.md .github/workflows
          git commit -m 'chore(tooling): standardize project toolchain'
          git push origin HEAD:agent/standardize-project-toolchain
