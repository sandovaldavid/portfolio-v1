name: Deploy to Vercel Preview

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read
  deployments: write
  pull-requests: write

jobs:
  deploy:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run linter
        run: bun run lint

      - name: Check formatting
        run: bun run format:check

      # Create GitHub Deployment so the PR shows the Environments box
      - name: Create GitHub Deployment
        id: gh-deploy
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const deploy = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.payload.pull_request.head.ref,
              environment: 'Preview',
              auto_merge: false,
              required_contexts: [],
              description: 'Vercel Preview',
              transient_environment: true,
            });
            core.setOutput('deployment_id', deploy.data.id);

      - name: Set deployment status — in_progress
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.gh-deploy.outputs.deployment_id }},
              state: 'in_progress',
              description: 'Deploying to Vercel…',
            });

      - name: Install Vercel CLI
        run: bun install -g vercel@latest

      - name: Pull Vercel Environment
        run: vercel pull --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Preview
        id: deploy
        run: |
          PREVIEW_URL=$(vercel deploy --prebuilt --yes --token=${{ secrets.VERCEL_TOKEN }})
          echo "preview_url=$PREVIEW_URL" >> $GITHUB_OUTPUT
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # Update GitHub Deployment to success with the preview URL
      - name: Set deployment status — success
        if: github.event_name == 'pull_request' && success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.gh-deploy.outputs.deployment_id }},
              state: 'success',
              environment_url: '${{ steps.deploy.outputs.preview_url }}',
              description: 'Deployed to Vercel Preview',
              log_url: 'https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}',
            });

      # Update GitHub Deployment to failure if anything went wrong
      - name: Set deployment status — failure
        if: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.gh-deploy.outputs.deployment_id }},
              state: 'failure',
              description: 'Deployment failed',
              log_url: 'https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}',
            });

      # Find existing comment and update it — never spam the PR with duplicates
      - name: Create or update PR comment
        if: github.event_name == 'pull_request' && success()
        uses: actions/github-script@v7
        with:
          script: |
            const MARKER = '<!-- deploy-preview-comment -->';
            const body = [
              MARKER,
              '### 🚀 Preview Deployment',
              '',
              `| | |`,
              `|---|---|`,
              `| **Preview URL** | [${{ steps.deploy.outputs.preview_url }}](${{ steps.deploy.outputs.preview_url }}) |`,
              `| **Test Reports** | [sandovaldavid.github.io/portfolio-v1](https://sandovaldavid.github.io/portfolio-v1/) |`,
              `| **Commit** | \`${{ github.sha }}`.slice(0, 47) + '` |',
              '',
              '_Updates automatically on each push._',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(MARKER));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Summary
        if: always()
        run: |
          echo "## 🚀 Preview Deployment" >> $GITHUB_STEP_SUMMARY
          echo "Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ steps.deploy.outputs.preview_url }}" ]; then
            echo "Preview URL: ${{ steps.deploy.outputs.preview_url }}" >> $GITHUB_STEP_SUMMARY
          fi
