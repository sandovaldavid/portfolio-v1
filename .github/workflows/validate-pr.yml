name: Validate PR

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop

jobs:
  validate:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Security audit
        run: bun audit --audit-level moderate

      - name: Run ESLint
        run: bun run lint

      - name: Check code formatting
        run: bun run format:check

      - name: Run unit tests
        run: bun run test:unit

      - name: Type check
        run: bun run build

      - name: Validate Conventional Commits
        if: github.event_name == 'pull_request'
        run: |
          # Get all commit messages in the PR
          git fetch origin ${{ github.base_ref }}
          COMMITS=$(git log origin/${{ github.base_ref }}..HEAD --pretty=%B)

          if [ -z "$COMMITS" ]; then
            echo "No commits found to validate"
            exit 0
          fi

          echo "Commits to validate:"
          echo "$COMMITS"

      - name: Summary
        if: always()
        run: |
          echo "## ✅ PR Validation Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Checks:" >> $GITHUB_STEP_SUMMARY
          echo "- ESLint: Completed" >> $GITHUB_STEP_SUMMARY
          echo "- Prettier: Completed" >> $GITHUB_STEP_SUMMARY
          echo "- Type Check: Completed" >> $GITHUB_STEP_SUMMARY
          echo "- Build: Completed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All checks must pass before merging to main." >> $GITHUB_STEP_SUMMARY
