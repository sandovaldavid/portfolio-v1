name: Repair architecture checker

on:
  pull_request:
    branches:
      - develop

permissions:
  contents: write

jobs:
  repair:
    if: github.head_ref == 'refactor/enforce-fsd-boundaries'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v7
        with:
          ref: refactor/enforce-fsd-boundaries
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Repair generated string and format branch diff
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path

          checker = Path('scripts/check-architecture.mjs')
          content = checker.read_text(encoding='utf-8')
          block_start = content.index('if (violations.length > 0) {')
          loop_start = content.index('\tfor (const violation of violations) {', block_start)
          fixed_prefix = content[:block_start] + "if (violations.length > 0) {\n\tconsole.error('\\nArchitecture boundary check failed:\\n');\n"
          checker.write_text(fixed_prefix + content[loop_start:], encoding='utf-8')
          PY

          git diff --name-only --diff-filter=ACM origin/develop...HEAD \
            | grep -v '^.github/workflows/diagnose-architecture.yml$' \
            | xargs --no-run-if-empty bunx prettier --write

      - name: Capture final validation
        id: validate
        shell: bash
        run: |
          set +e
          bun run check > /tmp/check.log 2>&1
          check_exit=$?
          bun run build > /tmp/build.log 2>&1
          build_exit=$?
          echo "check_exit=$check_exit" >> "$GITHUB_OUTPUT"
          echo "build_exit=$build_exit" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload final validation logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: architecture-repair-validation
          path: |
            /tmp/check.log
            /tmp/build.log
          retention-days: 1

      - name: Commit repair and remove temporary workflow
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/diagnose-architecture.yml
          git add -A
          git commit --no-verify -m "fix(architecture): repair executable boundary checker"
          git push origin HEAD:refactor/enforce-fsd-boundaries

      - name: Assert validation succeeded
        shell: bash
        env:
          CHECK_EXIT: ${{ steps.validate.outputs.check_exit }}
          BUILD_EXIT: ${{ steps.validate.outputs.build_exit }}
        run: |
          test "$CHECK_EXIT" = "0"
          test "$BUILD_EXIT" = "0"
