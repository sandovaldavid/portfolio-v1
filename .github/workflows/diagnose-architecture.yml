name: Diagnose architecture branch

on:
  pull_request:
    branches:
      - develop

permissions:
  contents: read

jobs:
  diagnose:
    if: github.head_ref == 'refactor/enforce-fsd-boundaries'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Capture quality and build output
        shell: bash
        run: |
          set +e
          bun run check > check.log 2>&1
          echo $? > check.exit-code
          bun run build > build.log 2>&1
          echo $? > build.exit-code
          exit 0

      - name: Upload diagnostics
        uses: actions/upload-artifact@v7
        with:
          name: architecture-diagnostics
          path: |
            check.log
            check.exit-code
            build.log
            build.exit-code
          retention-days: 1
