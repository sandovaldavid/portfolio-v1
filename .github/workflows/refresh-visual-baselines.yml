name: Refresh reviewed visual baselines

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: refresh-visual-baselines-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  refresh:
    if: github.head_ref == 'test/refresh-visual-baselines'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout baseline branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Setup repository
        uses: ./.github/actions/setup-bun

      - name: Build current application
        run: bun run build

      - name: Install visual-test browsers
        run: bunx playwright install --with-deps chromium firefox

      - name: Refresh reviewed Chromium, Firefox and Mobile Chrome baselines
        env:
          RUN_VISUAL_TESTS: 'true'
        run: |
          bunx playwright test tests/e2e/visual.spec.ts \
            --update-snapshots \
            --project=chromium \
            --project=firefox \
            --project='Mobile Chrome' \
            --grep='homepage hero|#experience|#projects|#about-me'

          bunx playwright test tests/e2e/visual.spec.ts \
            --update-snapshots \
            --project=firefox \
            --grep='#research|#technologies|footer'

      - name: Verify all maintained visual baselines without update mode
        env:
          RUN_VISUAL_TESTS: 'true'
        run: bun run test:e2e:visual

      - name: Remove temporary automation and commit reviewed snapshots
        shell: bash
        run: |
          rm .github/workflows/refresh-visual-baselines.yml
          rm .visual-baseline-update

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add tests/e2e/visual.spec.ts-snapshots .github/workflows/refresh-visual-baselines.yml .visual-baseline-update

          changed_files="$(git diff --cached --name-only)"
          printf '%s\n' "$changed_files"

          unexpected_files="$(printf '%s\n' "$changed_files" | grep -Ev '^(tests/e2e/visual\.spec\.ts-snapshots/.+\.png|\.github/workflows/refresh-visual-baselines\.yml|\.visual-baseline-update)$' || true)"
          if [[ -n "$unexpected_files" ]]; then
            echo 'Unexpected files would be committed:'
            printf '%s\n' "$unexpected_files"
            exit 1
          fi

          snapshot_count="$(printf '%s\n' "$changed_files" | grep -Ec '^tests/e2e/visual\.spec\.ts-snapshots/.+\.png$' || true)"
          if [[ "$snapshot_count" -ne 18 ]]; then
            echo "Expected exactly 18 changed snapshots, found $snapshot_count."
            exit 1
          fi

          git commit -m 'test(visual): refresh reviewed Linux baselines'
          git push origin HEAD:test/refresh-visual-baselines
