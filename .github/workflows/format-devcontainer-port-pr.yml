name: Format Dev Container Port Change Set

on:
    pull_request:
        branches: [main]
        paths:
            - '.github/workflows/format-devcontainer-port-pr.yml'

permissions:
    contents: write

jobs:
    format:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout pull request branch
              uses: actions/checkout@v7
              with:
                  ref: ${{ github.event.pull_request.head.ref }}

            - name: Setup repository
              uses: ./.github/actions/setup-bun

            - name: Format port publication change set
              run: |
                  bunx prettier --write \
                    .devcontainer/devcontainer.json \
                    package.json \
                    scripts/check-devcontainer-port.mjs \
                    docs/DEVCONTAINER.md

            - name: Commit formatting changes
              run: |
                  if git diff --quiet; then
                    exit 0
                  fi

                  git config user.name 'github-actions[bot]'
                  git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
                  git add \
                    .devcontainer/devcontainer.json \
                    package.json \
                    scripts/check-devcontainer-port.mjs \
                    docs/DEVCONTAINER.md
                  git commit -m 'style(devcontainer): format localhost publication changes'
                  git push origin HEAD:${{ github.event.pull_request.head.ref }}
