name: Documentation Format Diagnostic

on:
    pull_request:
        branches: [develop]

permissions:
    contents: read

jobs:
    diagnose:
        if: github.head_ref == 'docs/consolidate-repository-guidance'
        runs-on: ubuntu-latest
        steps:
            - name: Checkout pull request head
              uses: actions/checkout@v7
              with:
                  ref: ${{ github.event.pull_request.head.sha }}

            - name: Setup repository
              uses: ./.github/actions/setup-bun

            - name: Validate formatting
              id: formatting
              continue-on-error: true
              shell: bash
              run: bun run format:check 2>&1 | tee format-check.log

            - name: Validate documentation links
              id: links
              continue-on-error: true
              shell: bash
              run: bun run check:docs 2>&1 | tee docs-links.log

            - name: Validate lint
              id: lint
              continue-on-error: true
              shell: bash
              run: bun run lint 2>&1 | tee lint.log

            - name: Validate types
              id: types
              continue-on-error: true
              shell: bash
              run: bun run typecheck 2>&1 | tee typecheck.log

            - name: Upload diagnostics
              if: always()
              uses: actions/upload-artifact@v7
              with:
                  name: documentation-diagnostics
                  path: |
                      format-check.log
                      docs-links.log
                      lint.log
                      typecheck.log
                  if-no-files-found: error
                  retention-days: 1

            - name: Assert diagnostics
              if: always()
              shell: bash
              run: |
                  test '${{ steps.formatting.outcome }}' = 'success'
                  test '${{ steps.links.outcome }}' = 'success'
                  test '${{ steps.lint.outcome }}' = 'success'
                  test '${{ steps.types.outcome }}' = 'success'
