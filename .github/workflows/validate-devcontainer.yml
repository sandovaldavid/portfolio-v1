name: Validate Development Container

on:
	pull_request:
		branches: [main]

permissions:
	contents: read

concurrency:
	group: validate-devcontainer-${{ github.event.pull_request.number }}
	cancel-in-progress: true

jobs:
	devcontainer:
		if: github.head_ref == 'chore/reproducible-devcontainer'
		runs-on: ubuntu-24.04
		steps:
			- name: Checkout pull request head
				uses: actions/checkout@v7

			- name: Build and validate development container
				uses: devcontainers/ci@v0.3
				with:
					configFile: .devcontainer/devcontainer.json
					push: never
					runCmd: |
						bun --version
						bunx playwright --version
						bun run check
						bun run test:unit:ci
						bun run build
						bun run test:e2e:smoke
						docker --version
						docker compose version
						docker info
