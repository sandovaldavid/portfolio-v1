name: Issue 136 diagnostics

on:
    pull_request:
        branches: [main]

permissions:
    contents: read

jobs:
    diagnose:
        if: github.event.pull_request.head.ref == 'feat/136-localized-experience-content'
        runs-on: ubuntu-latest
        steps:
            - name: Checkout pull request head
              uses: actions/checkout@v7
              with:
                  ref: ${{ github.event.pull_request.head.sha }}

            - name: Setup repository
              uses: ./.github/actions/setup-bun

            - name: Format experience item with repository Prettier
              run: bunx prettier --write src/widgets/experience/ui/ExperienceItem.astro

            - name: Upload formatted source
              uses: actions/upload-artifact@v7
              with:
                  name: issue-136-formatted-source
                  path: src/widgets/experience/ui/ExperienceItem.astro
                  if-no-files-found: error
                  retention-days: 1
