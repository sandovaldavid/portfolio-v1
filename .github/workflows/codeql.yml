name: CodeQL

on:
  pull_request:
    branches:
      - develop

permissions:
  contents: write

jobs:
  migrate-toolchain:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: agent/standardize-project-toolchain

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Regenerate and verify lockfile
        run: |
          bun install --lockfile-only
          python - <<'PY'
          from pathlib import Path
          path = Path('bun.lock')
          content = path.read_text().replace('"name": "porfolio-dev"', '"name": "portfolio-v1"', 1)
          path.write_text(content)
          PY
          bun install --frozen-lockfile

      - name: Verify build
        run: bun run build

      - name: Publish generated lockfile through GitHub API
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          BRANCH: agent/standardize-project-toolchain
        run: |
          LOCK_SHA=$(curl --fail --silent --show-error \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPOSITORY}/contents/bun.lock?ref=${BRANCH}" | jq -r '.sha')

          export LOCK_SHA
          python - <<'PY'
          import base64
          import json
          import os
          from pathlib import Path

          payload = {
              'message': 'chore(tooling): synchronize Bun lockfile',
              'content': base64.b64encode(Path('bun.lock').read_bytes()).decode(),
              'sha': os.environ['LOCK_SHA'],
              'branch': os.environ['BRANCH'],
          }
          Path('payload.json').write_text(json.dumps(payload))
          PY

          curl --fail --silent --show-error \
            -X PUT \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            --data-binary @payload.json \
            "https://api.github.com/repos/${REPOSITORY}/contents/bun.lock"
