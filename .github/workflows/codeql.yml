name: Quality bootstrap

on:
  pull_request:
    branches:
      - develop

permissions:
  contents: read

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout quality branch
        uses: actions/checkout@v4
        with:
          ref: agent/complete-astro-quality-gates
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install and synchronize dependencies
        run: bun install

      - name: Format complete repository
        run: bun run format || true

      - name: Apply safe lint fixes
        run: bun run lint:fix || true

      - name: Collect quality results
        run: |
          set +e
          {
            echo '## Format check'
            bun run format:check
            echo "format_exit=$?"
            echo
            echo '## ESLint'
            bun run lint
            echo "lint_exit=$?"
            echo
            echo '## Type checking'
            bun run typecheck
            echo "typecheck_exit=$?"
          } 2>&1 | tee quality-report.txt
          exit 0

      - name: Package generated changes
        run: |
          git diff --name-only > changed-files.txt
          if [ -s changed-files.txt ]; then
            git diff --name-only -z | tar --null -czf quality-changes.tar.gz --files-from -
          else
            tar -czf quality-changes.tar.gz --files-from /dev/null
          fi
          git status --short >> quality-report.txt

      - name: Upload bootstrap artifact
        uses: actions/upload-artifact@v4
        with:
          name: quality-bootstrap
          path: |
            quality-changes.tar.gz
            quality-report.txt
            changed-files.txt
          retention-days: 1
