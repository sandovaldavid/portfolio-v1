name: CodeQL

on:
  pull_request:
    branches:
      - develop

permissions:
  contents: write

jobs:
  migrate-toolchain:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: agent/standardize-project-toolchain
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Regenerate and verify lockfile
        run: |
          bun install --lockfile-only
          bun install --frozen-lockfile

      - name: Verify build
        run: bun run build

      - name: Publish generated lockfile
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add bun.lock
          git commit -m 'chore(tooling): synchronize Bun lockfile'
          git push origin HEAD:agent/standardize-project-toolchain
