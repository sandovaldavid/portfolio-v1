name: CodeQL

on:
  pull_request:
    branches:
      - develop

permissions:
  contents: read

jobs:
  migrate-toolchain:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: agent/standardize-project-toolchain

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Regenerate and verify lockfile
        run: |
          bun install --lockfile-only
          bun install --frozen-lockfile

      - name: Verify build
        run: bun run build

      - name: Upload generated lockfile
        uses: actions/upload-artifact@v4
        with:
          name: generated-bun-lock
          path: bun.lock
          retention-days: 1
