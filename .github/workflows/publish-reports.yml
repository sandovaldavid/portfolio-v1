name: Publish Test Reports to GitHub Pages

on:
  workflow_run:
    workflows: ["Testing CI - Lighthouse & Playwright"]
    types:
      - completed

permissions:
  contents: write
  pages: write
  id-token: write
  actions: read
  pull-requests: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  publish-reports:
    name: Publish to GitHub Pages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Download all artifacts
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: testing-ci.yml
          run_id: ${{ github.event.workflow_run.id }}
          path: ./downloaded-artifacts

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Extract latest template
        run: |
          git show ${{ github.event.workflow_run.head_sha }}:docs/test-reports/index.html > index.html

      - name: Organize reports
        run: |
          mkdir -p playwright
          mkdir -p lighthouse
          mkdir -p coverage
          mkdir -p bundle-analysis
          
          PR_NUMBER="${{ github.event.workflow_run.pull_requests[0].number }}"
          HEAD_BRANCH="${{ github.event.workflow_run.head_branch }}"
          
          if [ -n "$PR_NUMBER" ]; then
            echo "Processing PR #${PR_NUMBER}"
            PR_DIR="prs/${PR_NUMBER}"
            mkdir -p "${PR_DIR}/playwright"
            mkdir -p "${PR_DIR}/lighthouse"
            mkdir -p "${PR_DIR}/coverage"
            mkdir -p "${PR_DIR}/bundle-analysis"
            
            if [ -d "downloaded-artifacts/playwright-report" ]; then
              cp -r downloaded-artifacts/playwright-report/. "${PR_DIR}/playwright/"
            fi
            
            if [ -d "downloaded-artifacts/lighthouse-reports" ]; then
              cp -r downloaded-artifacts/lighthouse-reports/. "${PR_DIR}/lighthouse/"
            fi

            if [ -d "downloaded-artifacts/coverage-report" ]; then
              cp -r downloaded-artifacts/coverage-report/. "${PR_DIR}/coverage/"
            fi

            if [ -d "downloaded-artifacts/bundle-analysis" ]; then
              cp -r downloaded-artifacts/bundle-analysis/. "${PR_DIR}/bundle-analysis/"
            fi
          else
            echo "Processing branch push: ${HEAD_BRANCH}"
            if [ "$HEAD_BRANCH" = "main" ] || [ "$HEAD_BRANCH" = "develop" ]; then
              if [ -d "downloaded-artifacts/playwright-report" ]; then
                cp -r downloaded-artifacts/playwright-report/. playwright/
              fi
              
              if [ -d "downloaded-artifacts/lighthouse-reports" ]; then
                cp -r downloaded-artifacts/lighthouse-reports/. lighthouse/
              fi

              if [ -d "downloaded-artifacts/coverage-report" ]; then
                cp -r downloaded-artifacts/coverage-report/. coverage/
              fi

              if [ -d "downloaded-artifacts/bundle-analysis" ]; then
                cp -r downloaded-artifacts/bundle-analysis/. bundle-analysis/
              fi
            fi
          fi

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff-index --quiet HEAD; then
            git commit -m "chore: deploy test reports for ${HEAD_BRANCH:-unknown} (${{ github.event.workflow_run.head_sha }})"
            git push origin gh-pages
          else
            echo "No changes to commit"
          fi

      - name: Upload to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Comment on PR with reports links
        uses: actions/github-script@v7
        with:
          script: |
            const prs = context.payload.workflow_run.pull_requests;
            if (!prs || prs.length === 0) {
              console.log('No pull requests associated with this workflow run.');
              return;
            }
            const prNumber = prs[0].number;
            const repoName = context.repo.repo;
            const owner = context.repo.owner;
            const MARKER = '<!-- gh-pages-reports-comment -->';
            
            const playwrightUrl = `https://${owner}.github.io/${repoName}/prs/${prNumber}/playwright/`;
            const lighthouseUrl = `https://${owner}.github.io/${repoName}/prs/${prNumber}/lighthouse/`;
            const coverageUrl = `https://${owner}.github.io/${repoName}/prs/${prNumber}/coverage/`;
            const bundleUrl = `https://${owner}.github.io/${repoName}/prs/${prNumber}/bundle-analysis/`;
            
            const body = [
              MARKER,
              '### 📊 Live Test Reports (GitHub Pages)',
              '',
              'Test reports have been published to GitHub Pages:',
              `* 🎭 **Playwright E2E:** [Open Report](${playwrightUrl})`,
              `* 🔦 **Lighthouse Audits:** [Open Report](${lighthouseUrl})`,
              `* 🧪 **Vitest Unit Coverage:** [Open Report](${coverageUrl})`,
              `* 📦 **Bundle Size Analysis:** [Open Report](${bundleUrl})`,
              '',
              '_Note: It might take a minute for GitHub Pages to update after deployment._'
            ].join('\n');
            
            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo: repoName,
              issue_number: prNumber,
            });
            const existing = comments.find(c => c.body.includes(MARKER));
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo: repoName,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo: repoName,
                issue_number: prNumber,
                body,
              });
            }
