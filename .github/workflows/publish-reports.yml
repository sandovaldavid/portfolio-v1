name: Publish Test Reports to GitHub Pages

on:
  workflow_run:
    workflows: ["Testing CI - Lighthouse & Playwright"]
    types:
      - completed
    branches:
      - main
      - develop

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  publish-reports:
    name: Publish to GitHub Pages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: testing-ci.yml
          run_id: ${{ github.event.workflow_run.id }}
          path: ./artifacts

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Create reports directory structure
        run: |
          mkdir -p reports/lighthouse
          mkdir -p reports/playwright
          mkdir -p reports/coverage
          cp docs/test-reports/index.html reports/index.html

      - name: Copy Lighthouse reports
        run: |
          if [ -d "artifacts/lighthouse-reports" ]; then
            cp -r artifacts/lighthouse-reports/. reports/lighthouse/
          fi

      - name: Copy Playwright report
        run: |
          if [ -d "artifacts/playwright-report" ]; then
            cp -r artifacts/playwright-report/. reports/playwright/
          fi

      - name: Upload to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: './reports'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Create deployment status
        run: |
          echo "Test reports published to GitHub Pages"
          echo "URL: ${{ steps.deployment.outputs.page_url }}"
