name: Testing CI - Lighthouse & Playwright

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: write
  deployments: write
  pages: write
  id-token: write
  pull-requests: write

concurrency:
  group: testing-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build project
        run: bun run build

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@*

      - name: Run Lighthouse CI
        run: lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: .lighthouseci
          retention-days: 30

  playwright:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps

      - name: Build project
        run: bun run build

      - name: Run Playwright tests
        run: bunx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            test-results.json
            junit-results.xml
          retention-days: 30

      - name: Comment PR with test results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const testResultsPath = 'test-results.json';

            if (fs.existsSync(testResultsPath)) {
              const testResults = JSON.parse(fs.readFileSync(testResultsPath, 'utf8'));
              const passed = testResults.stats.expected;
              const failed = testResults.stats.unexpected;
              const skipped = testResults.stats.skipped;

              const body = `### Test Results

              | Metric | Value |
              |--------|-------|
              | Passed | ${passed} |
              | Failed | ${failed} |
              | Skipped | ${skipped} |

              [View detailed report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`;

              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            }

  performance-summary:
    name: Performance Summary
    runs-on: ubuntu-latest
    needs: [lighthouse, playwright]
    if: always()

    steps:
      - name: Download Lighthouse artifacts
        uses: actions/download-artifact@v4
        with:
          name: lighthouse-reports
          path: ./lighthouse

      - name: Generate summary
        run: |
          echo "## Testing Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Lighthouse Results" >> $GITHUB_STEP_SUMMARY
          if [ -d "./lighthouse" ] && [ -f "./lighthouse/manifest.json" ]; then
            echo "Status: Completed" >> $GITHUB_STEP_SUMMARY
          else
            echo "Status: No results available" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**For detailed results, check the artifacts above.**" >> $GITHUB_STEP_SUMMARY
