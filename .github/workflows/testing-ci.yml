name: Testing CI - Lighthouse & Playwright

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: write
  deployments: write
  pages: write
  id-token: write
  pull-requests: write

concurrency:
  group: testing-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build project
        run: bun run build

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@*

      - name: Collect Lighthouse reports
        run: lhci collect
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Assert Lighthouse thresholds
        run: lhci assert
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Upload Lighthouse reports artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: .lighthouseci
          retention-days: 30

      - name: Upload reports to temporary public storage
        if: always()
        run: lhci upload
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

  playwright:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps

      - name: Build project
        run: bun run build

      - name: Run Playwright tests
        run: bunx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            test-results.json
            junit-results.xml
          retention-days: 30

      - name: Upload Bundle Analysis
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bundle-analysis
          path: dist/bundle-analysis/
          retention-days: 30


  vitest:
    name: Vitest Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run unit tests with coverage
        run: bun run test:unit:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

  performance-summary:
    name: Performance Summary
    runs-on: ubuntu-latest
    needs: [lighthouse, playwright, vitest]
    if: always()

    steps:
      - name: Download Lighthouse artifacts
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: lighthouse-reports
          path: ./lighthouse

      - name: Download Playwright test results
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: test-results
          path: ./test-results

      - name: Download Vitest Coverage artifacts
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: ./coverage

      - name: Download Bundle Analysis artifacts
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: bundle-analysis
          path: ./bundle-analysis

      - name: Generate summary
        run: |
          echo "## Testing Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Lighthouse Results" >> $GITHUB_STEP_SUMMARY
          if [ -d "./lighthouse" ] && [ -f "./lighthouse/manifest.json" ]; then
            echo "Status: Completed" >> $GITHUB_STEP_SUMMARY
          else
            echo "Status: No results available" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**For detailed results, check the artifacts above.**" >> $GITHUB_STEP_SUMMARY

      - name: Create or update PR comment with test results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const MARKER = '<!-- test-results-comment -->';

            // Parse Playwright results
            let pwRow = '| ⚠️ Playwright | Results not available |';
            const jsonPath = './test-results/test-results.json';
            if (fs.existsSync(jsonPath)) {
              const r = JSON.parse(fs.readFileSync(jsonPath, 'utf8'));
              const passed = r.stats?.expected ?? 0;
              const failed = r.stats?.unexpected ?? 0;
              const skipped = r.stats?.skipped ?? 0;
              const icon = failed > 0 ? '❌' : '✅';
              pwRow = `| ${icon} Playwright | ${passed} passed · ${failed} failed · ${skipped} skipped |`;
            }

            const lhRow = fs.existsSync('./lighthouse')
              ? '| ✅ Lighthouse | Completed — scores in artifacts |'
              : '| ⚠️ Lighthouse | Results not available |';

            const vitestRow = fs.existsSync('./coverage')
              ? '| ✅ Vitest Unit Tests | Completed — coverage in artifacts |'
              : '| ⚠️ Vitest Unit Tests | Results not available |';

            const bundleRow = fs.existsSync('./bundle-analysis')
              ? '| ✅ Bundle Analysis | Completed — visualizer in artifacts |'
              : '| ⚠️ Bundle Analysis | Results not available |';

            const runUrl = `https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            const body = [
              MARKER,
              '### 🧪 Test Results',
              '',
              '| | |',
              '|---|---|',
              pwRow,
              lhRow,
              vitestRow,
              bundleRow,
              `| 🔗 Actions Run | [View reports & artifacts](${runUrl}) |`,
              '',
              '_Playwright HTML report, Vitest coverage, bundle analysis, and Lighthouse results are downloadable from the Actions run linked above._',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(MARKER));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
