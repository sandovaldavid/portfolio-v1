name: Testing CI - Lighthouse & Playwright

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: testing-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    outputs:
      lh-url: ${{ steps.upload-lh.outputs.artifact-url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build project
        run: bun run build

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@*

      - name: Collect Lighthouse reports
        run: lhci collect
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Assert Lighthouse thresholds
        run: lhci assert
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Upload Lighthouse reports artifact
        id: upload-lh
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: .lighthouseci
          retention-days: 30

      - name: Upload reports to temporary public storage
        if: always()
        run: lhci upload
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

  playwright:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    outputs:
      pw-url: ${{ steps.upload-pw.outputs.artifact-url }}
      bundle-url: ${{ steps.upload-bundle.outputs.artifact-url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps

      - name: Build project
        run: bun run build

      - name: Run Playwright tests
        run: bunx playwright test --update-snapshots

      - name: Upload updated snapshots
        id: upload-snapshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-snapshots
          path: tests/e2e/visual.spec.ts-snapshots/
          retention-days: 7

      - name: Upload Playwright report
        id: upload-pw
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            test-results.json
            junit-results.xml
          retention-days: 30

      - name: Upload Bundle Analysis
        id: upload-bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bundle-analysis
          path: dist/bundle-analysis/
          retention-days: 30


  vitest:
    name: Vitest Unit Tests
    runs-on: ubuntu-latest
    outputs:
      cov-url: ${{ steps.upload-cov.outputs.artifact-url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run unit tests with coverage
        run: bun run test:unit:coverage

      - name: Upload coverage report
        id: upload-cov
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

  performance-summary:
    name: Performance Summary
    runs-on: ubuntu-latest
    needs: [lighthouse, playwright, vitest]
    if: always()

    steps:
      - name: Download Lighthouse artifacts
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: lighthouse-reports
          path: ./lighthouse

      - name: Download Playwright test results
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: test-results
          path: ./test-results

      - name: Download Vitest Coverage artifacts
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: ./coverage

      - name: Download Bundle Analysis artifacts
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: bundle-analysis
          path: ./bundle-analysis

      - name: Generate summary
        run: |
          echo "## Testing Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Lighthouse Results" >> $GITHUB_STEP_SUMMARY
          if [ -d "./lighthouse" ] && [ -f "./lighthouse/manifest.json" ]; then
            echo "Status: Completed" >> $GITHUB_STEP_SUMMARY
          else
            echo "Status: No results available" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**For detailed results, check the artifacts above.**" >> $GITHUB_STEP_SUMMARY

      - name: Create or update PR comment with test results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const MARKER = '<!-- test-results-comment -->';

            // Parse Playwright results
            let pwRow = '| ⚠️ Playwright | Results not available |';
            const jsonPath = './test-results/test-results.json';
            if (fs.existsSync(jsonPath)) {
              const r = JSON.parse(fs.readFileSync(jsonPath, 'utf8'));
              const passed = r.stats?.expected ?? 0;
              const failed = r.stats?.unexpected ?? 0;
              const skipped = r.stats?.skipped ?? 0;
              const icon = failed > 0 ? '❌' : '✅';
              pwRow = `| ${icon} Playwright | ${passed} passed · ${failed} failed · ${skipped} skipped |`;
            }

            const lhRow = fs.existsSync('./lighthouse')
              ? '| ✅ Lighthouse | Completed — scores in artifacts |'
              : '| ⚠️ Lighthouse | Results not available |';

            const vitestRow = fs.existsSync('./coverage')
              ? '| ✅ Vitest Unit Tests | Completed — coverage in artifacts |'
              : '| ⚠️ Vitest Unit Tests | Results not available |';

            const bundleRow = fs.existsSync('./bundle-analysis')
              ? '| ✅ Bundle Analysis | Completed — visualizer in artifacts |'
              : '| ⚠️ Bundle Analysis | Results not available |';

            const lhUrl     = '${{ needs.lighthouse.outputs.lh-url }}';
            const pwUrl     = '${{ needs.playwright.outputs.pw-url }}';
            const bundleUrl = '${{ needs.playwright.outputs.bundle-url }}';
            const covUrl    = '${{ needs.vitest.outputs.cov-url }}';
            const runId     = '${{ github.run_id }}';
            const runUrl    = `https://github.com/${{ github.repository }}/actions/runs/${runId}`;

            const artifactTable = [
              '### 📦 Report Artifacts',
              '',
              '| Report | Download |',
              '|--------|----------|',
              pwUrl     ? `| 🎭 Playwright HTML | [playwright-report](${pwUrl}) |`   : '| 🎭 Playwright HTML | _not available_ |',
              lhUrl     ? `| 🔦 Lighthouse      | [lighthouse-reports](${lhUrl}) |` : '| 🔦 Lighthouse | _not available_ |',
              covUrl    ? `| 🧪 Vitest Coverage | [coverage-report](${covUrl}) |`   : '| 🧪 Vitest Coverage | _not available_ |',
              bundleUrl ? `| 📦 Bundle Analysis | [bundle-analysis](${bundleUrl}) |` : '| 📦 Bundle Analysis | _not available_ |',
            ].join('\n');

            const localCommands = [
              '<details>',
              '<summary>📥 View reports locally (requires <code>gh</code> CLI)</summary>',
              '',
              '```bash',
              `# Download all artifacts for this run`,
              `gh run download ${runId}`,
              '',
              `# Open Playwright interactive report (opens browser automatically)`,
              `bunx playwright show-report playwright-report`,
              '',
              `# Serve coverage or bundle analysis as static site`,
              `npx serve coverage-report`,
              `npx serve bundle-analysis`,
              '```',
              '',
              '</details>',
            ].join('\n');

            const body = [
              MARKER,
              '### 🧪 Test Results',
              '',
              '| | |',
              '|---|---|',
              pwRow,
              lhRow,
              vitestRow,
              bundleRow,
              `| 🔗 Actions Run | [View all artifacts](${runUrl}) |`,
              '',
              artifactTable,
              '',
              localCommands,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(MARKER));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
