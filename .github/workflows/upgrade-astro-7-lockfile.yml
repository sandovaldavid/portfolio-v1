name: Prepare Astro 7 lockfile

on:
    push:
        branches: [chore/142-upgrade-astro-7]

permissions:
    contents: write

concurrency:
    group: prepare-astro-7-lockfile
    cancel-in-progress: true

jobs:
    update:
        if: github.actor != 'github-actions[bot]'
        runs-on: ubuntu-latest
        steps:
            - name: Checkout upgrade branch
              uses: actions/checkout@v7
              with:
                  ref: chore/142-upgrade-astro-7

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: 1.3.14

            - name: Upgrade Astro and official integrations
              run: |
                  bun update --latest \
                    astro \
                    @astrojs/mdx \
                    @astrojs/rss \
                    @astrojs/sitemap \
                    @astrojs/check \
                    vite
                  bun install --frozen-lockfile

            - name: Commit dependency manifest and lockfile
              shell: bash
              run: |
                  if git diff --quiet -- package.json bun.lock; then
                    echo "Dependency manifest and lockfile are already current."
                    exit 0
                  fi

                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git add package.json bun.lock
                  git commit -m "chore(astro): update Astro 7 dependency lock"
                  git push origin HEAD:chore/142-upgrade-astro-7
