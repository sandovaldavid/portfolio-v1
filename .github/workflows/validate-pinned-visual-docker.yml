name: Validate Pinned Visual Docker

on:
    pull_request:
        branches: [main]

permissions:
    contents: read

concurrency:
    group: validate-pinned-visual-${{ github.event.pull_request.number }}
    cancel-in-progress: true

jobs:
    visual-docker:
        if: github.head_ref == 'test/pinned-visual-docker'
        runs-on: ubuntu-24.04
        steps:
            - name: Checkout pull request head
              uses: actions/checkout@v7
              with:
                  ref: ${{ github.event.pull_request.head.sha }}

            - name: Run complete pinned Docker visual suite
              run: bun run test:e2e:visual:docker

            - name: Confirm snapshots remain unchanged
              run: git diff --exit-code -- tests/e2e/visual.spec.ts-snapshots
