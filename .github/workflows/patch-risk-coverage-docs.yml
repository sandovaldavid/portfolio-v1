name: Patch risk-based coverage guidance

on:
    push:
        branches: [test/risk-based-coverage]
        paths: [.github/workflows/patch-risk-coverage-docs.yml]

permissions:
    contents: write

jobs:
    patch:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout branch
              uses: actions/checkout@v7
              with:
                  ref: test/risk-based-coverage
                  fetch-depth: 0

            - name: Patch maintained testing guidance
              run: |
                  python - <<'PY'
                  from pathlib import Path

                  agents_path = Path('AGENTS.md')
                  agents = agents_path.read_text()
                  old_targets = """### Coverage Targets

                  [TARGET] Minimum 90% coverage:

                  - Lines: ≥90%
                  - Functions: ≥90%
                  - Branches: ≥90%
                  - Statements: ≥90%
                  """
                  new_targets = """### Coverage Policy

                  [TARGET] Minimum 90% within the risk-based pure-unit scope defined in
                  `vitest.config.ts`:

                  - Lines: ≥90%
                  - Functions: ≥90%
                  - Branches: ≥90%
                  - Statements: ≥90%

                  These percentages are not whole-repository coverage. Follow
                  `docs/testing/UNIT-COVERAGE.md` when adding behavior, tests or exclusions.
                  """
                  assert old_targets in agents, 'AGENTS coverage target block changed unexpectedly'
                  agents = agents.replace(old_targets, new_targets, 1)
                  agents = agents.replace(
                      '- [ ] Coverage ≥90%',
                      '- [ ] Risk-based unit coverage thresholds pass for the documented scope',
                      1,
                  )
                  agents = agents.replace('**Last Updated:** July 1, 2026', '**Last Updated:** July 18, 2026', 1)
                  agents_path.write_text(agents)

                  testing_path = Path('docs/TESTING.md')
                  testing = testing_path.read_text()
                  replacements = {
                      '- **Vitest**: Unit tests with coverage (i18n modules)':
                          '- **Vitest**: Risk-based unit coverage for deterministic shared logic',
                      'Configuration: `vitest.config.ts` (coverage scope limited to the i18n modules, 90% threshold)':
                          'Configuration: `vitest.config.ts`. The 90% thresholds apply only to the risk-based pure-unit scope documented in [`docs/testing/UNIT-COVERAGE.md`](testing/UNIT-COVERAGE.md), not to the whole repository.',
                      '**Unit spec files** (`tests/unit/`, 7 files): `i18n.spec.ts`, `components.spec.ts`, and the i18n\nsub-suite `i18n/{translations,url-lang,dictionaries,interpolation,localized-path}.spec.ts`.':
                          '**Unit spec files** (`tests/unit/`, 8 files): `i18n.spec.ts`, `components.spec.ts`,\n`content/locale-content-id.spec.ts`, and the i18n sub-suite\n`i18n/{translations,url-lang,dictionaries,interpolation,localized-path}.spec.ts`.',
                      '2. **test-unit** — Vitest with coverage':
                          '2. **test-unit** — Vitest with explicitly scoped risk-based coverage',
                      '- **coverage-report** — Vitest coverage (7-day retention)':
                          '- **coverage-report** — scoped Vitest HTML/LCOV/JSON coverage (7-day retention)',
                      'npx serve .lighthouseci/': 'npx serve lighthouse-reports/',
                  }
                  for old, new in replacements.items():
                      assert old in testing, f'docs/TESTING.md text changed unexpectedly: {old}'
                      testing = testing.replace(old, new, 1)
                  testing_path.write_text(testing)

                  Path('.github/workflows/patch-risk-coverage-docs.yml').unlink()
                  PY

            - name: Commit patched guidance
              run: |
                  git config user.name github-actions[bot]
                  git config user.email 41898282+github-actions[bot]@users.noreply.github.com
                  git add AGENTS.md docs/TESTING.md .github/workflows/patch-risk-coverage-docs.yml
                  git commit -m "docs(testing): align coverage guidance"
                  git push origin HEAD:test/risk-based-coverage
